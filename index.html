/* ===== 前端防禦機制（防君子、護學習） ===== */
(function(){
  // 1. Domain Lock
  var ALLOWED = ['lolopodcast.github.io','localhost','127.0.0.1'];
  var REDIRECT = 'https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo';
  // 本機雙擊（file://）或空 hostname 一律放行，供離線預覽
  var isLocal = (location.protocol === 'file:' || location.hostname === '' || location.hostname === null);
  if (!isLocal && !ALLOWED.some(function(d){ return location.hostname === d || location.hostname.endsWith('.'+d); })) {
    document.body.innerHTML = '<div style="text-align:center;padding:60px;font-family:sans-serif"><h1>Access Denied</h1><p>This resource is not authorised on this domain.</p></div>';
    setTimeout(function(){ location.href = REDIRECT; }, 3000);
    return;
  }
  // 2. Iframe Busting
  if (window.self !== window.top) {
    try { window.top.location.href = window.self.location.href; }
    catch(e) { document.body.innerHTML = '<div style="text-align:center;padding:60px"><h1>Frame Blocked</h1><p>This content cannot be embedded.</p></div>'; }
  }
})();

/* 版權提示 toast */
var COPYRIGHT_MSG = 'Intellectual Property of Prof. Shihmin Lo · For Educational Use Only';
var _toastTimer = null;
function showCopyrightToast(){
  var el = document.getElementById('__copyright_toast');
  if(!el){
    el = document.createElement('div');
    el.id = '__copyright_toast';
    el.style.cssText = 'position:fixed;left:50%;bottom:48px;transform:translateX(-50%);background:#004030;color:#D8C3A5;padding:12px 22px;border-radius:12px;font-family:Inter,sans-serif;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.35);z-index:99999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center';
    document.body.appendChild(el);
  }
  el.textContent = COPYRIGHT_MSG;
  el.style.opacity = '1';
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.style.opacity='0'; }, 2000);
}

/* 智慧型右鍵：有選取文字→放行；圖片/SVG/空白→攔截+提示 */
document.addEventListener('contextmenu', function(e){
  var selection = window.getSelection().toString().trim();
  var isImage = e.target.tagName === 'IMG' || (e.target.closest && e.target.closest('svg'));
  if (selection.length > 0) return true;
  if (isImage) { e.preventDefault(); showCopyrightToast(); return; }
  e.preventDefault(); showCopyrightToast();
});
/* 快捷鍵：攔截開發者工具；放行 Ctrl+P / Ctrl+S */
document.addEventListener('keydown', function(e){
  if (e.key === 'F12') { e.preventDefault(); showCopyrightToast(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'u') { e.preventDefault(); showCopyrightToast(); return; }
  if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) { e.preventDefault(); showCopyrightToast(); return; }
});
/* 圖片/SVG 拖曳攔截 */
document.addEventListener('dragstart', function(e){
  if (e.target.tagName === 'IMG' || (e.target.closest && e.target.closest('svg'))) e.preventDefault();
});

  for (let i = 0; i < p.length; i++)

  return btoa(r);
};

  const decoded = atob(token);
  let r = '';
  for (let i = 0; i < decoded.length; i++)
    r += String.fromCharCode(decoded.charCodeAt(i) ^ ((i + 7) * 3 & 0xFF));
  return parseInt(r.split(':')[1], 10);
};

  m4_nav: "4. TPS/Lean 改造流程慣性", m4_title: "用 TPS/Lean/PDCA 改造「流程慣性」",
  m4_overview: "流程慣性的解方在製造現場最具體：豐田生產系統（TPS）/ 精實生產（Lean）以 5S、JIT、自働化與 PDCA，把僵化、只知其然的常規「持續改造」，正是扭轉流程慣性的實作對應。",
  m4_highlights: ["5S","JIT 及時生產","自働化 Jidoka","PDCA","避免浪費","庫存流"],
  m4_p1: "5S 是現場改善的基礎：整理（留下需要的、依數量取捨）、整頓（物歸原位）、清掃、清潔、素養。5S 讓異常一眼可見，是讓「只知其然」的流程重新被理解、被質疑的起點。沒有 5S 的可視化，流程慣性就無從被察覺（呼應 Action 中的覺察 A）。",
  m4_p2: "JIT（Just-In-Time，及時生產）以拉式生產降低庫存，讓物料沿「原物料 → 在製品 → 成品 → 通路」順暢流動，避免浪費（waste）。自働化（Jidoka）則讓異常即停、內建品質，把問題即時浮現出來。兩者構成 TPS 的兩大支柱，迫使組織面對而非掩蓋流程問題。",
  m4_p3: "PDCA（Plan-Do-Check-Act）改善循環是把上述方法「制度化為持續校準」的引擎，呼應管理職能中的 Control。流程慣性之所以可怕，是因為流程一旦定型就停止被檢視；PDCA 強制每一輪都重新 Check，讓常規能被「持續改造」而非僵化。這正是文章所說：拆解並改造組織常規。",
  m4_wrapup: "5S 讓問題可見、JIT 讓流程流動、自働化讓異常浮現、PDCA 讓改善持續。TPS/Lean 不是製造業專利，而是一套「強制重新理解並改造常規」的方法論——正是扭轉流程慣性的實作引擎。",
  m4_terms: [
    { front: "5S", back: "整理、整頓、清掃、清潔、素養；現場可視化與標準化的基礎。" },
    { front: "JIT 及時生產", back: "拉式生產、降低庫存，讓物料順暢流動以避免浪費。" },
    { front: "自働化 Jidoka", back: "異常即停、內建品質，讓問題即時浮現而非被掩蓋。" },
    { front: "PDCA", back: "Plan-Do-Check-Act 改善循環；持續校準常規的引擎。" },
    { front: "避免浪費", back: "Lean 的核心目標；消除不增值的活動與過量庫存。" },
    { front: "庫存流", back: "原物料 → 在製品 → 成品 → 通路；JIT 力求各環節最小庫存。" }
  ],
  m4_q: [
    { q: "5S 不包含下列哪一項？", opts: ["創新","整理","整頓","素養"], ans: _A0, exp: "5S 為整理、整頓、清掃、清潔、素養，不含「創新」。" },
    { q: "JIT（及時生產）的主要目的是？", opts: ["降低庫存、避免浪費","提高售價","擴大廠房","增加員工"], ans: _A0, exp: "JIT 以拉式生產降低庫存、讓物料順暢流動，避免浪費。" },
    { q: "PDCA 對應管理職能 P-O-L-C 中的哪一項最密切？", opts: ["管控 Control","規劃 Planning","組織 Organizing","領導 Leading"], ans: _A0, exp: "PDCA 的 Check/Act 是持續校準，最貼近 Control（管控）。" },
    { q: "為何 PDCA 能對抗流程慣性？", opts: ["強制每輪重新檢視、持續改造常規","降低薪資成本","減少會議","增加庫存"], ans: _A0, exp: "流程一旦定型即停止被檢視；PDCA 每輪重新 Check，使常規被持續改造。" }
  ],

  m5_nav: "5. 動態能力與四大行動方案", m5_title: "動態能力與四大行動方案",
  m5_overview: "對抗三來源慣性，不能單打獨鬥，必須建構整體的「動態能力」——組織為順應多變環境，不斷調整、重組內外部資源的能力。文章提出的四大行動方案，恰可對位到管理職能 P-O-L-C。",
  m5_highlights: ["動態能力","策略對焦","雙元領導","外部協作","探索新事業"],
  m5_p1: "動態能力（Dynamic Capabilities）有兩大內涵：一是感知與掌握機會，藉此改變既有資源與能力；二是兼顧「深耕舊技術」與「探索新機會」的雙元（ambidexterity）。它不是針對單一慣性的見招拆招，而是一套能同時鬆動流程、人員、定位的整體能力。",
  m5_p2: "四大行動方案對位 POLC：①改變策略對焦機制（對應 Planning）——建立每季策略校準，讓策略從「重要但不緊急」變成定期動態對焦；②選育雙元領導人才（對應 Leading）——培養兼具效率與彈性的領導人，產品專案經理是好的培育職位；③產學研合作（對應 Organizing）——與工研院、大學等外部伙伴協作，交易成本常低於自行培育的組織成本。",
  m5_p3: "④特意探索全新事業（對應 Control 的更新與再造）——直接涉入新市場是最能掌控環境波動的做法；從既有核心能耐的衍生業務出發，從小失敗學習、藉小勝利建立信心。四案環環相扣：策略對焦提供方向、雙元領導提供推力、外部協作補足能力、探索新事業創造第二成長動能，共同建構動態能力。",
  m5_wrapup: "動態能力＝感知機會 + 重組資源 + 雙元（深耕舊×探索新）。四大行動方案不是並列選項，而是圍繞同一套動態能力的互補拼圖，分別對位 Planning、Leading、Organizing 與更新再造，共同擺脫僵化的流程、人員、定位。",
  m5_terms: [
    { front: "動態能力", back: "組織為順應環境，不斷調整、重組內外部資源的能力。" },
    { front: "雙元 Ambidexterity", back: "同時深耕既有技術（exploit）與探索新機會（explore）。" },
    { front: "策略對焦機制", back: "定期（每季）策略校準，讓策略從重要不緊急變成動態對焦。" },
    { front: "雙元領導人", back: "兼具效率與彈性、兼顧長短期、以身作則引領改變的領導人。" },
    { front: "產學研合作", back: "與工研院、大學等外部伙伴協作，降低取得新能力的交易成本。" },
    { front: "探索新事業", back: "直接涉入新市場以掌控環境波動，創造第二成長動能。" }
  ],
  m5_q: [
    { q: "動態能力的核心內涵不包含？", opts: ["維持現狀不變","感知與掌握機會","重組內外部資源","雙元（深耕×探索）"], ans: _A0, exp: "動態能力強調調整與重組，「維持現狀不變」正好相反。" },
    { q: "「每季策略校準」最對應哪一項管理職能？", opts: ["規劃 Planning","領導 Leading","組織 Organizing","管控 Control"], ans: _A0, exp: "策略對焦屬規劃職能，讓策略定期動態對焦。" },
    { q: "為何中小企業適合「產學研合作」？", opts: ["外部協作交易成本常低於自行培育的組織成本","因為免費","因為法規要求","因為不需人才"], ans: _A0, exp: "中小企業欠缺人才，與外部伙伴協作的交易成本通常較低。" },
    { q: "「雙元（ambidexterity）」指的是？", opts: ["同時深耕舊技術與探索新機會","同時降價與漲價","同時擴廠與裁員","同時代工與停工"], ans: _A0, exp: "雙元＝exploit（深耕既有）＋explore（探索新機會）並行。" }
  ],

  m6_nav: "6. 案例實證與整合", m6_title: "案例實證與整合",
  m6_overview: "本模組以四家台灣企業案例實證四大行動方案，並整合板書中「AI 工作型態」的構面——AI Agent 自動化常規（routine），釋放人力投入轉變型專案（project），呼應動態能力的雙元邏輯。",
  m6_highlights: ["展隆","竹輝","可廣","嘉東","Project vs Routine"],
  m6_p1: "展隆工業（隱形冠軍）面對市場成熟、主力客戶占比攀升，改採每季策略校準（方案①），由副總主持跨單位整合議題、外部顧問檢視策略目標與組織常規的一致性；並自建零售通路探索新事業（方案④），三年內年度損益兩平。竹輝工業（鋼纜鋼線）二代接班後推管理階層年輕化（方案②），於 ERP 基礎上架構物料、生產、品質的資料平台，逐步校準接單、採購、庫存與產能。",
  m6_p2: "可廣精機（中高階數控工具機）與工研院、大學產學研合作（方案③），先開發主軸軸承預兆分析，再延伸遠端監控管理系統，從專注設計製造轉型為「中小機械業升級的外部協作創新伙伴」。嘉東工業（成立近 50 年，螺絲螺帽/汽機車/航太零件）與中鋼合作開發特殊快削鋼材（方案④），掌控鋼材量價趨勢、進入產業上游。四案分別鬆動不同的慣性來源。",
  m6_p3: "整合板書的 AI 構面：工作可分為轉變型專案（project，特意、有時間性）與常規型工作（routine，重複性、需持續維運）。AI Agent（半自動、工作流，如 Claude/Skill、Gemini/Gem）可承接 routine 的自動化，釋放人力投入 project，正呼應動態能力「深耕舊（routine 自動化）× 探索新（project 創新）」的雙元邏輯。動態能力，最終是讓組織把資源從慣性中釋放、重新對焦於變革。",
  m6_wrapup: "展隆（①+④）、竹輝（②）、可廣（③）、嘉東（④）四案實證：扭轉慣性需整體動態能力。AI Agent 自動化 routine、釋放人力投入 project，是當代延伸——把人從慣性中解放，重新對焦於價值創造與變革。",
  m6_terms: [
    { front: "展隆工業", back: "隱形冠軍；每季策略校準（①）+ 自建通路探索新事業（④）。" },
    { front: "竹輝工業", back: "鋼纜鋼線；二代接班、管理年輕化（②）、資料平台校準。" },
    { front: "可廣精機", back: "數控工具機；產學研合作（③）轉型為協作創新伙伴。" },
    { front: "嘉東工業", back: "螺絲/航太零件；與中鋼開發快削鋼（④）、進入上游。" },
    { front: "Project vs Routine", back: "轉變型專案（特意、有時間性）vs 常規型（重複、需維運）。" },
    { front: "AI Agent", back: "半自動工作流（Claude/Skill、Gemini/Gem）；自動化常規、釋放人力。" }
  ],
  m6_q: [
    { q: "哪一家公司同時採用「策略對焦」與「探索新事業」兩個方案？", opts: ["展隆工業","竹輝工業","可廣精機","嘉東工業"], ans: _A0, exp: "展隆以每季策略校準（①）並自建通路探索新事業（④）。" },

    { q: "板書中 AI Agent 最適合承接哪一類工作？", opts: ["常規型 routine","轉變型 project","策略制定","董事會決議"], ans: _A0, exp: "AI Agent 適合自動化重複性的 routine，釋放人力投入 project。" },
    { q: "整合來看，動態能力的最終目的是？", opts: ["把資源從慣性釋放、重新對焦於變革","降低薪資","減少產品線","關閉海外廠"], ans: _A0, exp: "動態能力讓組織把資源從慣性中釋放，重新對焦於價值創造與變革。" }

  m0_intro: "Organizational inertia is a major barrier to corporate change: organizations run on familiar habits and past experience, tending to keep the status quo and even resist change. This interactive course uses the systematic, process-oriented architecture of Organizational Behavior & Management (OB&M) as an analytical lens — the P-O-L-C functions, the equation Action = f(A, M, C), five motivation theories, the TPS/Lean toolkit with the PDCA cycle, and work modes in the AI era — to dissect Prof. Shihmin Lo's Harvard Business Review article, 'Reversing Inertia, Launching Corporate Transformation.' We first diagnose the three sources of inertia (Process, People, Position) with the board framework, then prescribe remedies using motivation theory and lean methods, and finally integrate everything into 'dynamic capabilities' and four action plans, evidenced by four Taiwanese company cases. By the end you will have an operable framework to diagnose any organization's inertia and design action plans to launch change.",

  m1_nav: "1. From OB&M to Inertia", m1_title: "From OB&M to Organizational Inertia",
  m1_overview: "Organizational Behavior (OB) studies people's behavior and motivation; Management coordinates resources to reach goals through the P-O-L-C functions. When management fails to adapt to internal or external change, it shows up as 'organizational inertia.' This module builds the analytical lens for the whole course.",
  m1_highlights: ["OB behavior & motivation","Mgmt = f(P,O,L,C)","Action = f(A,M,C)","Awareness·Motivation·Capabilities","Inertia"],

  m1_p2: "At the micro level, whether an individual acts can be written as Action = f(A, M, C): Awareness, Motivation, Capabilities. All three are required — failing to notice change, lacking motivation, or lacking the capability to change all keep people in the status quo. Note that Action is roughly equal to Behavior, and Motivation is roughly equal to Intention; Capabilities is not the action itself but the input C in the equation.",

  m2_nav: "2. Three Sources (3P)", m2_title: "Three Sources: Process · People · Position",
  m2_overview: "The article identifies three sources of organizational inertia: Process, People and Position. They are not independent but mutually entangled, so any single-point change is pulled back to the start by the other two.",
  m2_highlights: ["Process","People","Position","Entangled","Move one, move all"],
  m2_p1: "Process rigidity: after bureaucratic divisions and processes are repeated for years, they often become 'knowing the how but not the why.' Even when change is unavoidable, fear of resource crowding-out or extra burden leads to the safe old path. In precision machinery, with R&D centralized and production moved overseas, design-change processes slow delivery, and moving one part moves the whole.",
  m2_p2: "People inertia: people prefer stability and repeating the familiar costs no effort; under short-term performance pressure they are numb to change. 'More work, more mistakes; less work, fewer mistakes' — best to keep the status quo, tweak at most, or simply resist. Many satellite-factory suppliers wait for orders, never staff business development, and with no second-generation successor are helpless when a client suddenly shifts orders.",
  m2_p3: "Position fixation: Taiwanese manufacturers are mostly positioned as large-batch OEMs, relying on economies of scale and obsessed with cost reduction. Shifting to own channels or brands means facing international clients and diverse demand directly — requiring a completely different mindset and capabilities. Moving from 'cost reduction' to 'people-centered value creation' is naturally hard. The three sources reinforce each other, which is the root reason inertia is so hard to shake.",

    { front: "Entangled", back: "The three sources constrain each other; single-point change is pulled back." },
    { front: "Move one, move all", back: "Changing one process triggers others and the org structure, making change harder." }

    { q: "'Knowing the how but not the why' best describes which inertia?", opts: ["Process inertia","People inertia","Position inertia","Financial inertia"], ans: _A0, exp: "Repeated processes losing sight of their purpose is classic Process inertia." },
    { q: "'More work, more mistakes' reflects which inertia?", opts: ["People inertia","Process inertia","Position inertia","Tech inertia"], ans: _A0, exp: "This status-quo mindset under performance pressure is People inertia." },
    { q: "Why can't you fight a single inertia in isolation?", opts: ["The three are entangled and mutually constraining","Costs are too high","Regulations forbid it","Lack of funding"], ans: _A0, exp: "Single-point change is pulled back; a holistic dynamic capability is needed." }

  m3_nav: "3. Diagnosing People Inertia", m3_title: "Diagnosing People Inertia with Motivation Theory",
  m3_overview: "The core of People inertia is 'unwilling to change.' This module calls on the five motivation theories from Prof. Lo's webpage — SDT, self-efficacy, expectancy, equity, OCB — together with Action = f(A,M,C) to systematically diagnose why individuals resist change.",
  m3_highlights: ["SDT","Self-Efficacy","Expectancy·Valence","Equity","OCB"],
  m3_p1: "Motivation is roughly Intention — the M in Action = f(A,M,C). When the organization demands change, whether employees form the motivation to change can be cross-diagnosed with five theories: SDT looks at whether autonomy, competence and relatedness are satisfied; self-efficacy looks at whether employees 'believe they can do it' — low efficacy is a common root of resistance.",
  m3_p2: "Expectancy theory breaks motivation into an 'effort → performance → reward' chain multiplied by valence: if employees believe change won't bring a valued outcome, motivation approaches zero. Equity theory looks at employees comparing their input-output ratio with others — if change merely adds burden without matching reward, they tend to keep the status quo.",
  m3_p3: "OCB (organizational citizenship behavior) is going beyond one's role to voluntarily help the organization; high-OCB employees more readily bear the extra effort change requires. Placing the five into Action = f(A,M,C): Awareness (A) lets employees see change is necessary, Motivation (M) is jointly set by the five theories, and Capabilities (C) needs training and resources. Only when all three are in place can People inertia be reversed.",

    { front: "Equity", back: "Employees compare their input-output ratio with others; unfairness lowers motivation." },
    { front: "OCB", back: "Going beyond one's role to voluntarily help the org; high OCB bears change effort." },

  m3_q: [
    { q: "An employee resisting because they 'don't believe they can do it' fits which theory?", opts: ["Self-Efficacy","Equity","OCB","Valence in expectancy"], ans: _A0, exp: "Self-efficacy is belief in one's ability; low efficacy causes resistance." },
    { q: "Expectancy theory multiplies 'effort→performance→reward' by which variable?", opts: ["Valence","Equity","Efficacy","Autonomy"], ans: _A0, exp: "Valence reflects how one values the outcome; low valence drives motivation to zero." },
    { q: "Which three needs does SDT emphasize?", opts: ["Autonomy, competence, relatedness","Money, status, power","Safety, social, esteem","Planning, organizing, control"], ans: _A0, exp: "SDT's three needs are autonomy, competence and relatedness." },
    { q: "In Action = f(A,M,C), the five theories mainly affect which term?", opts: ["M (Motivation)","A (Awareness)","C (Capabilities)","None"], ans: _A0, exp: "The five jointly set Motivation M; motivation is roughly intention." }
  ],

  m4_nav: "4. TPS/Lean Reshapes Process", m4_title: "Reshaping Process Inertia with TPS/Lean/PDCA",
  m4_overview: "The remedy for Process inertia is most concrete on the shop floor: the Toyota Production System (TPS) / Lean uses 5S, JIT, Jidoka and PDCA to continuously reshape rigid, rote routines — the practical counterpart to reversing Process inertia.",
  m4_highlights: ["5S","JIT","Jidoka","PDCA","Eliminate waste","Inventory flow"],
  m4_p1: "5S is the foundation of shop-floor improvement: Sort (keep what's needed by quantity), Set in order (a place for everything), Shine, Standardize, Sustain. 5S makes abnormalities visible at a glance — the starting point for re-understanding and re-questioning 'know-the-how' routines. Without 5S visualization, process inertia cannot even be perceived (echoing Awareness in the Action equation).",
  m4_p2: "JIT (Just-In-Time) uses pull production to cut inventory, letting material flow smoothly along 'raw material → WIP → finished goods → channel' and eliminating waste. Jidoka (autonomation) stops on abnormality and builds in quality, surfacing problems immediately. Together they form the two pillars of TPS, forcing the organization to confront rather than hide process problems.",
  m4_p3: "The PDCA (Plan-Do-Check-Act) cycle is the engine that 'institutionalizes continuous calibration' of the above, echoing the Control function. Process inertia is dangerous because once a process sets, it stops being examined; PDCA forces a fresh Check each round, letting routines be 'continuously reshaped' rather than ossifying. This is exactly what the article calls dismantling and reshaping organizational routines.",
  m4_wrapup: "5S makes problems visible, JIT makes the process flow, Jidoka surfaces abnormalities, PDCA keeps improvement going. TPS/Lean isn't exclusive to manufacturing — it's a methodology that 'forces re-understanding and reshaping of routines,' the practical engine for reversing Process inertia.",

  m5_nav: "5. Dynamic Capabilities & 4 Plans", m5_title: "Dynamic Capabilities & Four Action Plans",
  m5_overview: "Fighting the three-source inertia can't be done alone; you must build a holistic 'dynamic capability' — the ability to continuously adjust and reconfigure internal and external resources to adapt to a changing environment. The article's four action plans map neatly onto the P-O-L-C functions.",

/* ===== FlipCardDeck ===== */
const FlipCardDeck = ({ terms, t, moduleId, onCardRead }) => {
  const [groupIdx, setGroupIdx] = useState(0);
  const [flipped, setFlipped] = useState({});
  const [readSet, setReadSet] = useState(new Set());
  const [shownSet, setShownSet] = useState(new Set());
  const [shuffledOrder] = useState(() => [...Array(terms.length).keys()].sort(() => Math.random() - 0.5));
  const groupSize = 2;
  const totalGroups = Math.ceil(terms.length / groupSize);
  const startIdx = groupIdx * groupSize;
  const currentCardIndices = shuffledOrder.slice(startIdx, startIdx + groupSize);
  useEffect(() => {
    const newShown = new Set(shownSet);
    currentCardIndices.forEach(idx => newShown.add(idx));
    if (newShown.size !== shownSet.size) setShownSet(newShown);
  }, [groupIdx]);
  const handleFlip = (origIdx) => {
    setFlipped(f => ({ ...f, [origIdx]: !f[origIdx] }));
    if (!readSet.has(origIdx)) {
      const newRead = new Set(readSet); newRead.add(origIdx); setReadSet(newRead);
      if (onCardRead) onCardRead(moduleId, newRead.size, shownSet.size, terms.length);
    }
  };
  const statusText = t.flip_status.replace('{read}', readSet.size).replace('{shown}', shownSet.size).replace('{total}', terms.length);
  return (
    <div className="mt-8">
      <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-2">{t.key_terms}</h3>
      <p className="text-sm text-slate-400 mb-4">{statusText}</p>

/* ===== ModuleQuiz ===== */
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit, moduleName }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState({});
  const [groupIdx, setGroupIdx] = useState(0);
  const groupSize = 2;
  const [quizIndices] = useState(() => [...Array(questions.length).keys()].sort(() => Math.random() - 0.5));
  const totalGroups = Math.ceil(quizIndices.length / groupSize);
  const [shuffledMaps] = useState(() => quizIndices.map(qIdx => {
    const n = questions[qIdx].opts.length;
    return [...Array(n).keys()].sort(() => Math.random() - 0.5);
  }));
  const totalAnswered = Object.keys(selected).length;
  const computeCorrect = () => {
    let c = 0;
    quizIndices.forEach((qIdx, qi) => {
      if (selected[qi] === undefined) return;
      if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) c++;
    });
    return c;
  };
  const statusText = t.quiz_status.replace('{correct}', computeCorrect()).replace('{answered}', totalAnswered).replace('{total}', quizIndices.length);
  const currentStart = groupIdx * groupSize;
  const currentIndices = quizIndices.slice(currentStart, currentStart + groupSize);
  const handleGroupSubmit = () => {
    const allDone = currentIndices.every((_, i) => selected[currentStart + i] !== undefined);
    if (!allDone) return;
    setSubmitted(s => ({ ...s, [groupIdx]: true }));
    if (groupIdx === totalGroups - 1 || Object.keys(submitted).length + 1 === totalGroups) {
      const wrongQs = []; let correct = 0;
      quizIndices.forEach((qIdx, qi) => {
        if (selected[qi] === undefined) return;
        if (shuffledMaps[qi][selected[qi]] === _d(questions[qIdx].ans)) correct++;
        else wrongQs.push(questions[qIdx].q);
      });
      onQuizSubmit(moduleId, correct, quizIndices.length, wrongQs, moduleName);
    }
  };
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-2">{t.quiz_title}</h3>
      <p className="text-sm text-slate-400 mb-6">{statusText}</p>
      {currentIndices.map((qIdx, localI) => {
        const qi = currentStart + localI;
        const q = questions[qIdx];
        const sMap = shuffledMaps[qi];
        const isGrpSub = !!submitted[groupIdx];
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">
              {sMap.map((origIdx, dIdx) => {
                const isCorrect = origIdx === _d(q.ans);
                const isSel = selected[qi] === dIdx;
                return (
                  <button key={dIdx} onClick={() => !isGrpSub && setSelected(s => ({...s, [qi]: dIdx}))}
                    className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                      ${isGrpSub
                        ? isCorrect ? 'bg-green-100 border-green-500 dark:bg-green-900/30'
                          : isSel ? 'bg-red-100 border-red-400 dark:bg-red-900/30' : 'border-slate-200 dark:border-slate-700'
                        : isSel ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                      }`}>
                    {q.opts[origIdx]}
                  </button>
                );
              })}
            </div>
            {isGrpSub && (
              <p className={`mt-2 text-sm italic ${shuffledMaps[qi][selected[qi]] === _d(q.ans) ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400'}`}>
                {shuffledMaps[qi][selected[qi]] === _d(q.ans) ? `✓ ${t.correct}` : `✗ ${t.incorrect}`} — {t.explanation}：{q.exp}
              </p>
            )}
          </div>
        );
      })}
      <div className="flex items-center gap-3">
        {!submitted[groupIdx]
          ? <button onClick={handleGroupSubmit} disabled={!currentIndices.every((_,i) => selected[currentStart+i] !== undefined)}
              className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">{t.submit}</button>
          : <>
              {groupIdx < totalGroups-1 && (
                <button onClick={() => setGroupIdx(groupIdx+1)} className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg">{t.quiz_next}</button>
              )}
              <button onClick={() => { setGroupIdx(0); setSelected({}); setSubmitted({}); }}
                className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">{t.quiz_retry}</button>
            </>
        }
      </div>
    </div>
  );
};

/* Lab 2：Action = f(A,M,C) 行動可能性計算器 */
const LabAMC = ({lang}) => {
  const [a, setA] = useState(70), [m, setM] = useState(60), [c, setC] = useState(50);
  const likelihood = Math.round((a/100) * (m/100) * (c/100) * 100);
  const bottleneck = Math.min(a, m, c);
  const bnLabel = bottleneck === a ? (lang==='zh'?'覺察 Awareness':'Awareness') : bottleneck === m ? (lang==='zh'?'動機 Motivation':'Motivation') : (lang==='zh'?'能力 Capabilities':'Capabilities');
  return (
    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h4 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">Action = f(A, M, C)</h4>
      <LabSlider label={lang==='zh'?'A 覺察 Awareness':'A Awareness'} value={a} setValue={setA} color="#004030"/>
      <LabSlider label={lang==='zh'?'M 動機 Motivation':'M Motivation'} value={m} setValue={setM} color="#004030"/>
      <LabSlider label={lang==='zh'?'C 能力 Capabilities':'C Capabilities'} value={c} setValue={setC} color="#004030"/>
      <div className="mt-4 p-4 rounded-lg bg-[#004030]/8 dark:bg-[#D8C3A5]/10 text-center">
        <div className="text-sm text-slate-500 dark:text-slate-400">{lang==='zh'?'採取行動的可能性（乘積）':'Likelihood of action (product)'}</div>
        <div className="text-3xl font-black text-[#004030] dark:text-[#D8C3A5]">{likelihood}%</div>
        <div className="text-xs mt-2 text-red-500 dark:text-red-400">{lang==='zh'?'瓶頸項：':'Bottleneck: '}{bnLabel}（{bottleneck}）</div>
      </div>
      <p className="text-xs text-slate-400 mt-3">{lang==='zh'?'三者相乘：任一項偏低都會大幅拉低行動可能性——缺一不可。':'Multiplicative: any low term sharply lowers the likelihood — all three are required.'}</p>
    </div>
  );
};

/* ===== App 主程式 ===== */
function App() {
  const LS_KEY = 'OIDC_SPA_analytics';
  const LS_STU = 'OIDC_SPA_student';
  const loadLS = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };

  const [lang, setLang] = useState('en');
  const [isDark, setIsDark] = useState(true);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState(() => loadLS(LS_STU, { group:'', dept:'', id:'', nameEn:'', nameZh:'' }));
  const [analytics, setAnalytics] = useState(() => loadLS(LS_KEY, {
    time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
    quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0),
    cardsRead: Array(TOTAL).fill(0), cardsTotal: Array(TOTAL).fill(0),
    visited: Array(TOTAL).fill(false), wrongTopics: {}
  }));
  const menuRef = useRef(null);
  const t = dict[lang];

  const ICONS = ['🎯','🧭','🔺','🧠','🏭','🔄','📊'];
  const modulesList = [
    { id:0, num:'0', icon:'🎯', title:t.m0_nav },
    ...Array.from({length:NUM_LEARN}, (_,k)=>({ id:k+1, num:String(k+1), icon:ICONS[k+1]||'📘', title:t[`m${k+1}_nav`] })),
    { id:IDX_LAB, num:String(IDX_LAB), icon:'🧪', title:t.mlab_nav },
    { id:IDX_RES, num:String(IDX_RES), icon:'🌐', title:t.mres_nav },
    { id:IDX_ANA, num:String(IDX_ANA), icon:'📈', title:`${IDX_ANA}. ${t.analytics_title}` }
  ];

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(analytics)); } catch {} }, [analytics]);
  useEffect(() => { try { localStorage.setItem(LS_STU, JSON.stringify(studentInfo)); } catch {} }, [studentInfo]);

  // 標記已瀏覽
  useEffect(() => {
    setAnalytics(a => { if (a.visited[module]) return a; const v=[...a.visited]; v[module]=true; return {...a, visited:v}; });
    window.scrollTo({top:0, behavior:'smooth'});
    if (ttsState!=='idle') { speechSynthesis.cancel(); setTtsState('idle'); }
  }, [module]);

  // 停留時間
  useEffect(() => {
    const timer = setInterval(() => {
      setAnalytics(a => { const tm=[...a.time]; tm[module]+=1; return {...a, time:tm}; });
    }, 1000);
    return () => clearInterval(timer);
  }, [module]);

  // 外部點擊收合選單
  useEffect(() => {
    const h = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const bumpClick = () => setAnalytics(a => { const c=[...a.clicks]; c[module]+=1; return {...a, clicks:c}; });

  const handleQuizSubmit = (mid, correct, total, wrongQs, moduleName) => {
    setAnalytics(a => {
      const qc=[...a.quizCorrect], qt=[...a.quizTotal];
      qc[mid]=correct; qt[mid]=total;
      const wt={...a.wrongTopics}; wt[mid]=wrongQs||[];
      return {...a, quizCorrect:qc, quizTotal:qt, wrongTopics:wt};
    });
  };
  const handleCardRead = (mid, readCount, shownCount, totalCount) => {
    setAnalytics(a => { const cr=[...a.cardsRead], ct=[...a.cardsTotal]; cr[mid]=readCount; ct[mid]=totalCount; return {...a, cardsRead:cr, cardsTotal:ct}; });
  };

  /* ===== TTS ===== */
  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { speechSynthesis.resume(); setTtsState('playing'); return; }
      speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) {
        texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc,
          ...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),
          ...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)];
      } else if (module >= 1 && module <= NUM_LEARN) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`], t[`${mk}_overview`],
          ...(t[`${mk}_highlights`]||[]),
          t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`],
          ...(t[`${mk}_terms`]||[]).flatMap(tm=>[tm.front, tm.back]),
          t[`${mk}_wrapup`]];
      } else if (module === IDX_LAB) {
        texts = [t.mlab_title, t.mlab_desc, ...(t.mlab_labs||[]).map(l=>`${l.title}. ${l.desc||''}`)];
      } else if (module === IDX_RES) {
        texts = [t.mres_title, t.mres_desc, ...(t.mres_links||[]).map(l=>`${l.label}. ${l.desc||''}`)];
      } else if (module === IDX_ANA) {
        const tc = analytics.quizCorrect.reduce((a,b)=>a+b,0);
        const ta = analytics.quizTotal.reduce((a,b)=>a+b,0);
        const oa = ta>0 ? Math.round(tc/ta*100) : 0;
        texts = [t.analytics_title, t.analytics_desc, `${t.analytics_overall_acc}: ${oa}%`];
      }
      texts = texts.filter(Boolean);
      const utt = new SpeechSynthesisUtterance(texts.join(sep));
      utt.rate = 0.95;
      const voices = speechSynthesis.getVoices();
      if (lang==='zh') {
        const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
        if (v) utt.voice = v; utt.lang = 'zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));
        if (v) utt.voice = v; utt.lang = 'en-GB';
      }
      utt.onend = () => setTtsState('idle');
      utt.onerror = () => setTtsState('idle');
      speechSynthesis.speak(utt);
      setTtsState('playing');
    }
  };

  /* ===== CSV 匯出 ===== */
  const formInfoComplete = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.nameEn && studentInfo.nameZh;
  const exportCSV = () => {
    if (!formInfoComplete) return;
    const z = dict.zh;
    const d = new Date();
    const ymd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const rows = [];
    rows.push(['Group','Class','StudentID','NameEn','NameZh','Module','Time(s)','Clicks','CardsRead','CardsTotal','QuizCorrect','QuizTotal','Accuracy(%)','WrongQuestions']);
    modulesList.forEach(m => {
      const i = m.id;
      const acc = analytics.quizTotal[i]>0 ? Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100) : '';
      const wrong = (analytics.wrongTopics[i]||[]).join(' | ').replace(/"/g,'""');
      rows.push([studentInfo.group, studentInfo.dept, studentInfo.id, studentInfo.nameEn, studentInfo.nameZh,
        z[`m${i}_nav`]||m.title, analytics.time[i], analytics.clicks[i],
        analytics.cardsRead[i], analytics.cardsTotal[i],
        analytics.quizCorrect[i], analytics.quizTotal[i], acc, `"${wrong}"`]);
    });
    const csv = '\uFEFF' + rows.map(r=>r.join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${z.brand} ${z.title}_${studentInfo.nameEn} ${studentInfo.nameZh}_${ymd}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

        <h3 className="font-serif font-bold text-xl text-[#004030] dark:text-[#D8C3A5] mb-2">{t.m0_why}</h3>
        <p className="text-slate-700 dark:text-slate-300 leading-relaxed">{t.m0_why_desc}</p>

      <h3 className="font-serif font-bold text-xl text-[#004030] dark:text-[#D8C3A5] mb-4">{t.nav_modules}</h3>

        {(t.m0_modules||[]).map((m,i)=>(

        <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">{label}</div>
      </div>

          <Stat val={`${totalClicks}${t.analytics_times}`} label={t.analytics_total_clicks} />
          <Stat val={`${overallAcc}%`} label={t.analytics_overall_acc} />
          <Stat val={`${cardUsage}%`} label={t.analytics_card_usage} />
        </div>

        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 mb-8">

                <button key={i} onClick={()=>setModule(i)} className="w-full flex items-center gap-3 text-left text-sm py-1.5 hover:bg-slate-50 dark:hover:bg-slate-700/50 rounded-lg px-2">
                  <span>{m.icon}</span>
                  <span className="flex-1 truncate text-slate-700 dark:text-slate-200">{m.title}</span>
                  <span className={`text-xs px-2 py-0.5 rounded-full ${analytics.visited[i]?'bg-[#004030]/10 text-[#004030] dark:bg-[#D8C3A5]/10 dark:text-[#D8C3A5]':'bg-slate-100 text-slate-400 dark:bg-slate-700'}`}>{analytics.visited[i]?t.analytics_progress_visited:t.analytics_progress_not_visited}</span>
                  {done && <span className="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300">{t.analytics_progress_quiz_done}</span>}
                </button>
              );
            })}
          </div>
        </div>

        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 mb-8">
          <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_wp_title}</h3>
          {weak.length===0 ? (
            <p className="text-sm text-green-600 dark:text-green-400">{ta>0 ? t.analytics_wp_allpass : t.analytics_no_data}</p>
          ) : (
            <div className="space-y-4">
              {weak.map(w=>(
                <div key={w.id} className="border-l-4 border-red-400 pl-4">
                  <div className="flex items-center justify-between">
                    <span className="font-bold text-slate-700 dark:text-slate-200">{w.name}</span>
                    <span className="text-red-500 font-bold">{w.acc}%</span>
                  </div>
                  {(analytics.wrongTopics[w.id]||[]).length>0 && (
                    <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">
                      {t.analytics_wp_incorrect}
                      <ul className="list-disc ml-5 mt-1">{(analytics.wrongTopics[w.id]||[]).map((q,j)=>(<li key={j}>{q}</li>))}</ul>
                    </div>
                  )}
                  <button onClick={()=>setModule(w.id)} className="text-xs text-[#004030] dark:text-[#D8C3A5] font-bold mt-2 hover:underline">{t.analytics_wp_goto}</button>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 mb-8 overflow-x-auto">

              <tr className="text-left text-slate-500 border-b border-slate-200 dark:border-slate-700">

                <th className="py-2 px-2">{t.analytics_clicks}</th>
                <th className="py-2 px-2">{t.analytics_cards_read_total}</th>
                <th className="py-2 px-2">{t.analytics_correct_ans_total}</th>
                <th className="py-2 pl-2">{t.analytics_acc}</th>

            <tbody>
              {modulesList.filter(m=>m.id>=1 && m.id<=NUM_LEARN).map(m=>{

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">

          <p className="text-xs text-slate-400 mt-3">💾 {t.analytics_wp_saved}</p>
        </div>
      </div>

  };

  /* ===== 主畫面 ===== */
  return (
    <div className="min-h-screen flex flex-col bg-[#f4f4f4] dark:bg-[#121212] text-slate-900 dark:text-slate-100 overflow-x-hidden">
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-3 sm:px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-1 sm:gap-2 min-w-0">

            <button key={m.id} onClick={()=>{ setModule(m.id); window.scrollTo({top:0,behavior:'smooth'}); }}
              className={`w-full flex items-center gap-3 px-3 py-2.5 text-sm rounded-lg mb-1 ${module===m.id?'bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] font-bold':'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'}`}>

              className="px-5 py-2.5 rounded-lg border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold text-sm disabled:opacity-0">← {t.nav_prev}</button>
            <button onClick={()=>{ setModule(Math.min(TOTAL-1,module+1)); window.scrollTo({top:0,behavior:'smooth'}); }} disabled={module===TOTAL-1}
              className="px-5 py-2.5 rounded-lg bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold text-sm disabled:opacity-0">{t.nav_next} →</button>
          </div>
        </main>
      </div>

      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs truncate">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3 shrink-0">
          <span className="hidden sm:inline">{t.architect_label}&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline">Prof. Shihmin Lo</a></span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white font-bold">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
