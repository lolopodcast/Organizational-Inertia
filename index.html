// ════════ Domain Lock + Iframe Busting ════════
(function(){
  const ALLOWED = ['lolopodcast.github.io','localhost','127.0.0.1'];
  const REDIRECT = 'https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo';
  if (!ALLOWED.some(d => location.hostname === d || location.hostname.endsWith('.'+d))) {
    if (location.protocol !== 'file:') {
      document.body.innerHTML = '<div style="text-align:center;padding:60px;font-family:sans-serif"><h1>Access Denied</h1><p>This resource is not authorised on this domain.</p></div>';
      setTimeout(() => location.href = REDIRECT, 3000);
      return;
    }
  }
  if (window.self !== window.top) {
    try { window.top.location.href = window.self.location.href; }
    catch(e) { document.body.innerHTML = '<div style="text-align:center;padding:60px"><h1>Frame Blocked</h1><p>This content cannot be embedded.</p></div>'; }
  }
})();

// ════════ 智慧型右鍵 + 快捷鍵攔截 ════════
const COPYRIGHT_MSG = 'Intellectual Property of Prof. Shihmin Lo';
window._showCopyrightToast = () => {
  const existing = document.getElementById('cr-toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = 'cr-toast';
  t.className = 'toast-anim';
  t.style.cssText = 'position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#004030;color:#D8C3A5;padding:12px 24px;border-radius:8px;font-size:14px;font-family:sans-serif;z-index:9999;box-shadow:0 8px 20px rgba(0,0,0,0.3);';
  t.textContent = COPYRIGHT_MSG;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
};
document.addEventListener('contextmenu', e => {
  const sel = window.getSelection().toString().trim();
  const isImg = e.target.tagName === 'IMG' || e.target.closest('svg');
  if (sel.length > 0) return true;
  if (isImg) { e.preventDefault(); window._showCopyrightToast(); return; }
  e.preventDefault(); window._showCopyrightToast();
});
document.addEventListener('keydown', e => {
  if (e.key === 'F12') { e.preventDefault(); window._showCopyrightToast(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'u') { e.preventDefault(); window._showCopyrightToast(); return; }
  if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) { e.preventDefault(); window._showCopyrightToast(); return; }
});
document.addEventListener('dragstart', e => {
  if (e.target.tagName === 'IMG' || e.target.closest('svg')) e.preventDefault();
});
</script>

    m1_overview: "過去把 Chat / Project / Cowork / Skill / Code 講成「五個並列層次」是錯的。正確的視角是：介面決定能力範圍，能力組合決定工作流型態。Cowork 不是與 Code 並列的工具，而是內建 Code 能力的桌面 GUI 版本。",
    m1_highlights: ["介面 × 能力", "Cowork 內建 Code", "檔案位置決定介面", "不是五選一"],
    m1_p1: "工作模式應拆成兩個軸線。介面軸代表你在哪裡跟 Claude 互動：Claude.ai 網頁、Claude Desktop（含 Cowork 模式）、Claude Code CLI。能力軸代表這個介面內建什麼：對話、Code 執行、本機檔案存取、Skill 觸發、Project 載入、MCP Connector。不同介面內建的能力組合不同——Claude.ai 網頁的 Code 只能作用在雲端容器，Cowork 的 Code 可以作用在你授權的本機資料夾，Claude Code CLI 則完全跑在你本機。",
    m1_p2: "最常見的誤解是把「Cowork」和「Code」當成並列的兩個工具——其實 Cowork 內建 Code 能力，本質上就是 Claude Code 的桌面 GUI 版本，跑在 Apple Virtualization Framework 隔離的虛擬機上，你授權的本機資料夾被 mount 進這個 VM，Code（Python/bash）就能直接操作那個資料夾。換句話說，「Cowork vs Code」這個問題本身就問錯了——你用 Cowork，就自動有 Code，兩者是同一件事的兩個面向，不是要選一個。",
    m1_p3: "校正後的判斷流程很簡單。第一步問：檔案在哪裡？在本機就選 Cowork 或 CLI；在對話內就用網頁版。第二步問：任務需要什麼能力？確認你選的介面內建那些能力。第三步：要不要加 Skill、Project、Connector？視重用頻率與脈絡需求而定。這個流程把工具決策從「五選一的水平選擇」改成「介面層 + 能力層的垂直疊加」，避免了過去「Cowork 還是 Code」這種偽問題。維運型 skill（如 spa-consistency-check）的執行就是典型案例：它需要本機檔案存取 + Code 批次處理，在 Cowork 環境一次到位，不需要分階段。",
    m1_wrapup: "不要把工具當成五選一，要拆成介面 × 能力二維。Cowork 不是與 Code 並列的選項——Cowork 內建 Code 能力。真正的決策軸線是「檔案在哪裡 + 需要什麼能力組合」，而不是「該用哪個模式」。理解這個校正，你的工作流選擇就會從直覺猜測升級為可推理的架構決策。",

    // ============ M2 記憶與知識體系 ============
    m2_nav: "2. 記憶與知識體系",
    m2_title: "Context Window 內的四層分工",
    m2_overview: "Memory 管你是誰、Project 管任務範圍、Skill 管執行規格、KB 管知識內容。四者分工互補，共同存在於 Context Window 這個容器中。",
    m2_highlights: ["Context 是容器", "Memory 個人記憶", "Project 任務脈絡", "Skill 執行章程", "KB 知識資產"],
    m2_p1: "Context Window 是「Claude 這次對話能看到的所有文字」的總空間。很多人誤以為 Memory 等於 Context Window，其實 Memory 只是 Context Window 內的一個區塊。一個完整的 Context Window 包含：System Prompt、Memory（個人記憶）、Project Files（專案脈絡）、User Preferences（使用偏好）、Skill 內容（觸發時載入）、本次對話歷史、工具呼叫結果。這一坨全部加起來，不能超過模型的上限。理解這個結構後，你會發現「為什麼長對話會變慢、變不準」——因為 context 持續累積、擠壓其他區塊的空間。",
    m2_p2: "四層記憶各司其職。Memory 是「跨對話延續、記住你這個人的長期樣貌」，由系統自動維護，內容是濃縮摘要而非逐字稿。Project 是「記住這個任務範圍的固定脈絡」，每次對話自動載入，起手就有完整背景。Skill 是「把執行規格與流程封裝為可觸發的章程」，一次性固定成本、多次重用。KB 是「把外部材料萃取結構化的長期資產」，比原始材料精簡，跨平台可攜耐久。這四者疊起來才是完整的記憶與執行體系，互相補位、不是互相取代。",
    m2_p3: "為什麼這個分層重要？因為每一層的 token 經濟特性不同。Memory 是「免費背景」但不能塞太多細節，否則會稀釋掉真正重要的個人資訊。Project 「起手稍貴但對話省力」，適合穩定脈絡。Skill 「一次性成本換無限重用紅利」。KB「投資未來，換取後續無數次的省力與精準」。當你誤把 Project 當 Memory 用，或把 Skill 當 KB 用，效率就會大打折扣。正確的分層，讓每種記憶放在最適合它的位置。",
    m2_wrapup: "Memory、Project、Skill、KB 不是「都記住你的東西」的同義詞，而是四種不同性質的記憶機制。理解它們的分工，你就能精準決定：這個資訊該放在哪一層？塞錯地方不只浪費 token，還會降低 AI 的判斷品質。",

    // ============ M3 Token 經濟學 ============
    m3_nav: "3. Token 經濟學",
    m3_title: "一次性成本、累積成本、起手成本的權衡",
    m3_overview: "看單次成本會誤判，要看任務生命週期的總成本。投資結構化（Skill、KB）= 用一次成本換無限重用紅利。",
    m3_highlights: ["三種成本類型", "生命週期視角", "反直覺真相", "投資 vs. 即用"],
    m3_p1: "Token 成本可分為三種類型。一次性成本（One-time）指的是讀 SKILL.md、載入 KB 這類「付一次、重用多次」的成本。累積成本（Cumulative）指的是對話歷史越長吃越多、每次重講規格的成本。起手成本（Startup）指的是 Project 載入、Memory 注入這類「每次對話開頭就有」的成本。三種成本的時間分布不同，決定了它們的最佳使用情境。",
    m3_p2: "一個反直覺的真相：Skill 通常省 token，不是耗 token。因為它取代了「每次都要對齊規格」的累積成本。同樣地，Code 通常省 token，不是耗 token——大檔案不必進 context。Project 起手貴，但長期省——適合穩定脈絡、不適合一次性任務。看單次成本會誤判，要看任務生命週期的總成本。一個 SKILL.md 讀一次 5000 token，但替你省下後續 20 輪對話中每輪 2000 token 的規格對齊，總帳是大賺。",
    m3_p3: "Token 經濟學的最高境界是「結構化投資」。把規格寫進 Skill、把材料整理成 KB、把任務交給 Code、把脈絡放進 Project——這些都是用一次性投資換取後續無數次的省力與精準。當你開始用「生命週期總成本」而非「單次成本」來判斷，你的工作流就會自然往最高效率的方向演化。終極判準是：這個投資的回收期是多長？如果同類任務會做 3 次以上，投資 Skill 或 KB 幾乎一定划算；只做一次，就不必。",
    m3_wrapup: "Token 經濟學不是「省錢」的小聰明，而是「設計工作流」的核心邏輯。每個決策——用 Chat 還是 Project、用 Skill 還是即時對話、用 Code 還是肉眼處理——背後都是 token 經濟學在運作。理解它，你的決策就會從直覺升級為計算。",

    // ============ M4 Code 執行的角色 ============
    m4_nav: "4. Code 執行的角色",
    m4_title: "思考型任務與執行型任務的本質差異",
    m4_overview: "Code 是執行的工具，不是思考的工具。需要「真的做出某個結果」時用它，需要「想清楚某件事」時不用。",
    m4_highlights: ["思考 vs. 執行", "Skill + Code 絕配", "規模問題用 Code", "100 份法則", "Code 作用範圍由介面決定"],
    m4_p1: "「該不該用 Code」對應一個更根本的問題：這個任務的本質是「思考」還是「執行」？思考型任務包括理解、解釋、討論、決策、創作——這些用「對話模式」最有效。執行型任務包括計算、轉檔、處理大量資料、產生檔案——這些用「Code 模式」最有效。混淆兩者會出問題：思考型任務硬上 Code = 浪費；執行型任務硬不用 Code = 出錯、燒 token。",
    m4_p2: "必須用 Code 的情境包括：產生二進位檔案（docx、xlsx、pptx、pdf）、精確數值運算與統計分析、批次檔案操作、圖表生成、部署與 Git 操作。強烈建議用 Code 的情境包括：長文件程式化處理、大資料量但只要重點、重複性操作。不該用 Code 的情境包括：純對話與寫作、寫程式碼給使用者拿走（不需執行驗證時）、簡單邏輯推理。判斷的訣竅是問自己：這個任務是「需要想清楚」還是「需要真的做出來」？",
    m4_p3: "Skill 跟 Code 不是衝突的工具，而是絕配。Code 做髒活、Skill 做精緻產出。例如：Code 負責讀 30 份 PDF、跑詞頻、生統計；Skill（例如 docx）負責把結果包裝成正式報告格式。一個更深層的判準是「100 份法則」：如果這個任務有 100 份要處理會不會崩潰？會崩潰就用 Code，不會就用 Chat + Skill。3 份還能撐，30 份開始痛，100 份必定崩潰——這個簡單的問題能幫你做出 90% 的正確判斷。最後一個關鍵校正：Code 是「能力」不是「介面」，它存在於所有介面，但作用範圍由介面決定。Claude.ai 網頁的 Code 只能作用在雲端容器內的上傳檔案；Cowork 的 Code 可以作用在你授權的本機資料夾；CLI 的 Code 完全本機原生。所以「該不該用 Code」跟「該用哪個介面」是兩個獨立問題，不要混為一談。",
    m4_wrapup: "Code 是執行的工具，不是思考的工具。殺雞不用牛刀，挖隧道別用牙籤——選對工具是 token 經濟學最具體的展現。當你開始把任務分為「思考型」和「執行型」並對應不同模式，並理解「Code 的作用範圍由介面決定」，你的工作流效率會立刻提升一個層級。",

    // ============ M5 Semi-Agent 工作流 ============
    m5_nav: "5. Semi-Agent 工作流",
    m5_title: "從工具呼叫到自主執行的光譜",
    m5_overview: "Semi-Agent 是「人類定義目標 + AI 自主執行流程」的甜蜜點。SKILL.md 本質上是微型 agent 的章程。",
    m5_highlights: ["Agent 光譜", "Level 2 甜蜜點", "向內自主", "Skill 是章程"],
    m5_p1: "Agent 光譜從淺到深可分為五層。Level 0 純對話工具——你問一句我答一句，所有決策都在使用者身上。Level 1 工具呼叫——AI 會主動搜尋、讀檔、執行程式碼，但每一步仍是「你下指令、我執行單一動作」。Level 2 Semi-Agent——AI 能讀 Skill 內化規格與流程，自己決定多步驟工作的順序，在使用者定義的任務範圍內有局部自主性。Level 3 Agent——AI 有持續目標，自己排定子任務，會主動回報或發起對話。Level 4 Autonomous Agent——長時間運行、跨多個目標、自己管理優先順序。",
    m5_p2: "Semi-Agent 的關鍵特徵是「向內自主、向外受控」。向內：AI 在任務內部多步驟自主執行——讀 SKILL.md、掃描資料夾、生成產出物、寫回資料夾，這一連串不需要使用者一步步指令。向外：任務的啟動與終止由使用者掌握——你說「做 SPA」AI 才做、做完就停。這種「半自主」的特性，既保留使用者的控制權，又釋放 AI 的執行能力，是目前最實用的工作流型態。判斷你的工作流位於哪個 Level，可以問：AI 有沒有在做你沒明確下指令、但任務需要的事？",
    m5_p3: "SKILL.md 本質上是「微型 agent 的章程」。每次精修 SKILL.md，等於訓練這個 semi-agent 行為更穩定、更不需要使用者介入。換個角度看，你不是在「使用」AI，而是在「設計」一個小型 agent 系統。要從 Semi-Agent 推進到 Level 3 Agent，還需要三樣東西：觸發機制（webhook、定時、檔案變更偵測）讓任務自動啟動、跨任務記憶（執行狀態、未完成清單）、自主邊界判斷（哪些情況該自主、哪些該停下來問）。這些 Claude Code 或自建 agent 架構可以做到，但 Chat + Skill + Cowork 刻意停在 Semi-Agent 是有道理的——保留控制權，避免 AI 自作主張。",
    m5_wrapup: "你不只是 AI 的使用者，你是 AI 工作流的設計者。每一份 SKILL.md 都是微型 agent 的章程，每一次工具組合都是工作流架構決策。Semi-Agent 不是技術名詞，而是一個讓人類與 AI 各司其職的設計哲學。",

    m5_terms: [

    m6_title: "從創造端到規模端的完整工作流",
    m6_overview: "AI 協作工作流不只要優化「創造」，也要優化「規模」。維運型 skill 是 semi-agent 工作流的另一半，讓系統有自我修復能力。",
    m6_highlights: ["創造 vs. 維運", "批次任務判準", "spa-consistency-check", "自我修復系統"],
    m6_p1: "目前大多數 skill 都集中在「創造端」——把無變成有、把素材變成產出物。例如 note-to-kb 把筆記變 KB、kb-to-quiz 把 KB 變測驗、interactive-learning-spa 把規格變 SPA。但工作不只是「創造」，還有「維護現有產出物」——當規範更新後，舊的產出物該怎麼跟上？當資料夾結構漂移時，該如何稽核？這些「維護、檢查、批次更新」的工作，就是「維運型 skill」要解決的。",
    m6_p2: "創造型與維運型 skill 在五個構面上有本質差異。輸入：創造型是原始素材，維運型是現有產出物。輸出：創造型是新的產出物，維運型是報告 + 修正後的檔案。任務本質：創造型是思考型（理解、設計），維運型是執行型（掃描、比對、修改）。是否需要 Code：創造型通常不需要，維運型通常必要。觸發頻率：創造型是每次新任務，維運型是每次規範更新或定期稽核。創造型 skill 解決「重新發明輪子」的痛，維運型 skill 解決「機械性重複勞動」的痛。",
    m6_p3: "spa-consistency-check 是維運型 skill 的典型案例。它掃描指定資料夾中的所有 SPA HTML 檔案，依照 interactive-learning-spa 最新規範進行一致性檢查，產出 Markdown 報告，並以「逐項互動式修補」模式協助使用者更新不合規檔案。當你同時擁有創造型（produces SPA）與維運型（maintains SPA）skill 後，工作流會出現有趣的特性——它有自我修復能力。改了規範 → 跑 consistency-check 找不合規檔案 → 跑 batch-update 批次修補 → 整個系統自動跟上最新標準。這就從 Level 2 Semi-Agent 往 Level 3 Agent 推進了一小步。",
    m6_wrapup: "AI 協作工作流的完整型態需要兩端優化：創造端 + 維運端。創造型 skill 解決「從 0 到 1」的問題，維運型 skill 解決「從 1 到 N 的一致性」問題。當兩端都建立後，你的 semi-agent 工作流會接近全自動——而起點往往就是第一個維運型 skill 的開發。",

    // M0
    m0_nav: "0. Executive Summary",
    m0_title: "AI Workflow Methodology",
    m0_intro: "The value of AI tools lies not only in what they can do, but in how they are organised. When Chat, Project, Cowork, Skill, Code, Memory, and Knowledge Base coexist, the real test for users is judgment rather than features. This methodology integrates scattered tool elements into a workflow system that can be reasoned about, optimised, and evolved. Starting from foundational concepts, it clarifies the distinction between SPAs and frontend-only sites; it then enters the 'Interface × Capability' two-dimensional architecture of working modes, showing that Cowork has Code built in — it is not an option parallel to Code; it deepens into the four-tier memory and knowledge system, revealing the positions of Context Window, Memory, Project, Skill, and KB; with Token Economics as a shared metric, intuitive guesses become calculable decisions. The role of Code execution clarifies the essential difference between thinking-tasks and doing-tasks, plus the critical correction that Code's reach is determined by the interface. Semi-Agent workflow design reveals why refining SKILL.md equals designing a micro-agent. Finally, with criteria for batch tasks and the development of operational skills, the workflow extends from the creation end to the scale end.",
    m0_why: "Why does this methodology matter?",
    m0_why_desc: "Because AI tools are evolving from a single conversational assistant into a layered workflow system. Without methodology, users reinvent the wheel, burn tokens, and make poor decisions on every task. With methodology, users focus on what truly requires thinking and automate the mechanical. The ultimate goal of this system is the Semi-Agent workflow — humans define goals, AI executes autonomously, both parties play their proper roles.",
    m0_modules: [
      { num: "01", title: "Working Mode Spectrum", desc: "The 'Interface × Capability' two-dimensional architecture, and the critical correction that Cowork has Code built in" },
      { num: "02", title: "Memory & Knowledge System", desc: "Four-tier division within Context Window: Memory, Project, Skill, KB" },
      { num: "03", title: "Token Economics", desc: "Calculating and weighing one-time, cumulative, and startup costs" },

    ],

    // ============ M1 ============
    m1_nav: "1. Working Mode Spectrum",
    m1_title: "Two-Dimensional Composition: Interface × Capability",
    m1_overview: "The old framing of Chat / Project / Cowork / Skill / Code as 'five parallel layers' is wrong. The correct view: the interface determines the reach of capabilities, and the capability composition determines the workflow form. Cowork is NOT a tool parallel to Code — it is the desktop GUI version with Code capability built in.",
    m1_highlights: ["Interface × Capability", "Cowork Has Code Built In", "File Location → Interface", "Not Pick-One-of-Five"],
    m1_p1: "Working modes should decompose into two axes. The interface axis is where you talk with Claude: Claude.ai web, Claude Desktop (with Cowork mode), Claude Code CLI. The capability axis is what that interface bundles in: conversation, Code execution, local file access, Skill triggering, Project loading, MCP Connectors. Different interfaces bundle different capability sets — Claude.ai web's Code only acts inside the cloud container; Cowork's Code can act on user-authorised local folders; Claude Code CLI runs entirely on your local machine.",
    m1_p2: "The most common misconception treats 'Cowork' and 'Code' as two parallel tools — but Cowork has Code built in. It is essentially the desktop GUI version of Claude Code, running inside an isolated VM via Apple Virtualization Framework. The local folder you authorise gets mounted into that VM, and Code (Python/bash) operates on the folder directly. In other words, 'Cowork vs Code' is a wrong question — when you use Cowork, you automatically have Code. They are two facets of one thing, not options to choose between.",
    m1_p3: "The corrected decision flow is simple. Step one: where are the files? Local → choose Cowork or CLI; in-conversation → use the web. Step two: what capabilities does the task need? Confirm your chosen interface bundles them. Step three: add Skill / Project / Connector? Decided by reuse frequency and context needs. This flow upgrades tool choice from a 'pick-one-of-five horizontal selection' to 'interface layer + capability layer vertical stacking', eliminating false dichotomies like 'Cowork or Code'. Running an operational skill (e.g., spa-consistency-check) is a textbook case: it needs local file access + Code batch processing — Cowork does it in one shot, no staging required.",
    m1_wrapup: "Don't treat tools as five-choose-one — decompose them as Interface × Capability. Cowork is not an option parallel to Code; Cowork has Code built in. The real decision axes are 'where are the files' + 'what capability mix is needed', not 'which mode to use'. Internalise this correction, and your workflow choices upgrade from intuitive guessing to reasoned architectural decisions.",

    m1_terms: [
      { front: "Interface Axis", back: "Where you interact with Claude: Claude.ai web, Claude Desktop (Cowork), Claude Code CLI. Interface determines the reach of capabilities." },
      { front: "Capability Axis", back: "What the interface bundles: conversation, Code execution, local file access, Skill triggering, Project loading, MCP Connectors." },
      { front: "Cowork Mode", back: "The desktop agent mode in Claude Desktop, with Code capability + local folder access built in. Runs in an isolated VM, plan-then-act flow. Essentially the GUI version of Claude Code." },
      { front: "Claude.ai Web", back: "Code runs inside the cloud container, only accesses uploaded files and downloads, cannot directly read/write local folders." },
      { front: "Claude Code CLI", back: "Terminal tool, runs entirely on the user's local machine with native OS permissions. Suited for developers and CI integration." },
      { front: "Code Capability", back: "The ability to run Python/bash. Exists in every interface, but the scope of action is determined by the interface (cloud container / local mount / fully local)." },
      { front: "Cowork ≠ Code", back: "A misconception. Cowork has Code capability built in — they are not parallel options but two facets of one thing." },
      { front: "Local File Access", back: "Ability to read/write user's computer folders. Absent in Claude.ai web; present in Cowork and CLI. Determines whether local batch operations are possible." }
    ],

    m1_q: [
      { q: "Which view is WRONG?",
        opts: ["Cowork has Code capability built in", "Cowork and Code are two parallel tools", "Claude.ai web's Code only acts in the cloud container", "Cowork is the desktop GUI version of Claude Code"],
        ans: _A1, exp: "Cowork and Code are NOT parallel tools but two facets of one thing — Cowork has Code built in. The other three are correct." },
      { q: "After correction, what two axes should working modes decompose into?",
        opts: ["Creation vs. Operations", "Personal vs. Team", "Interface × Capability", "Free vs. Paid"],
        ans: _A2, exp: "Interface axis (where you interact) × Capability axis (what's built in) is the correct two-dimensional decomposition, eliminating the false 'pick-one-of-five' framing." },
      { q: "I want to run batch operations on a local folder (e.g., spa-consistency-check). Which interface is best?",
        opts: ["Claude.ai web", "Cowork (Claude Desktop)", "Plain email", "GitHub Issues"],
        ans: _A1, exp: "Cowork bundles Code capability + local folder access, making it the best interface for local batch operations. The web cannot write back to local files directly." },
      { q: "Which is the correct description of 'Cowork'?",
        opts: ["A competitor to Code", "A desktop agent running in an isolated VM, with Code built in, accessing authorised local folders", "The desktop version of pure conversation mode", "Requires coding skills to use"],
        ans: _A1, exp: "Cowork runs in an isolated VM via Apple Virtualization Framework, local folders mount into the VM, Code is built in, and it follows a plan-then-act flow." },
      { q: "When deciding which interface to use, what should you ask first?",
        opts: ["How much does it cost", "Where are the files", "How large is the team", "Which AI model is it"],
        ans: _A1, exp: "File location determines interface choice — local → Cowork or CLI; in-conversation → web. This is the first question after correction." }
    ],

    // ============ M2 ============
    m2_nav: "2. Memory & Knowledge System",
    m2_title: "Four-Tier Division Within the Context Window",
    m2_overview: "Memory manages who you are, Project manages task scope, Skill manages execution specs, KB manages knowledge content. Four tiers complement each other inside the Context Window container.",
    m2_highlights: ["Context as Container", "Memory = Personal", "Project = Task Scope", "Skill = Constitution", "KB = Asset"],
    m2_p1: "The Context Window is the total space of all text Claude can see in this conversation. Many mistake Memory for Context Window itself — but Memory is only one block inside the Context Window. A complete Context Window contains: System Prompt, Memory, Project Files, User Preferences, Skill content (when triggered), the current conversation history, and tool-call results. The whole stack cannot exceed the model's limit. Understanding this structure explains why long conversations become slow and inaccurate — context keeps accumulating and squeezes out other blocks.",
    m2_p2: "Each of the four memory tiers has its own role. Memory persists across conversations, recording the long-term shape of who you are; it is system-maintained, condensed summary rather than transcript. Project remembers the fixed context of a task scope, auto-loaded each conversation, providing complete background upfront. Skill encapsulates execution specs and flow as a triggerable constitution — one-time fixed cost, repeated reuse. KB is a long-term asset extracted and structured from external material — more concise than the raw, cross-platform, portable, durable. The four together form a complete memory-and-execution system, complementing rather than replacing each other.",
    m2_p3: "Why does this layering matter? Because each tier has different token-economic properties. Memory is 'free background' but cannot be overloaded with detail — it would dilute the truly important personal information. Project is 'higher startup, easier conversation', suiting stable contexts. Skill is 'one-time investment for unlimited reuse dividend'. KB is 'invest in the future, harvest endless future savings and precision'. When you mistakenly treat Project as Memory, or Skill as KB, efficiency drops sharply. Correct layering places each memory type at the position best suited for it.",
    m2_wrapup: "Memory, Project, Skill, and KB are not synonyms for 'things AI remembers about you' — they are four distinct mechanisms with different natures. Understanding their division of labour lets you decide precisely: which tier should this information go into? Wrong placement wastes tokens and degrades AI judgment quality.",

    m2_terms: [
      { front: "Context Window", back: "The total space of all text Claude can see in this conversation. Contains System Prompt, Memory, Project, Skill, conversation history, etc." },
      { front: "Memory", back: "Cross-conversation persistence, recording your long-term shape. System-maintained, condensed summary not transcript." },
      { front: "Project", back: "Remembers the fixed context of a task scope. Attached files, instructions, KB, auto-loaded every conversation." },
      { front: "Skill", back: "Encapsulates execution specs and flow as a triggerable constitution. One-time fixed cost, repeated reuse. The micro-agent constitution." },
      { front: "Knowledge Base", back: "Long-term asset from external material, extracted and structured. More concise than raw, cross-platform, portable, durable." },
      { front: "Parametric Knowledge", back: "Built-in knowledge from model training. Stored in neural network weights, cannot be directly edited or added." },
      { front: "External Knowledge", back: "Content provided to AI that it didn't originally know. Exists in Context Window or retrievable locations." },
      { front: "Meta-knowledge KB", back: "A KB about 'methodology for using tools'. Extremely long lifecycle, influencing all future decisions." }
    ],

    m2_q: [
      { q: "What is the relationship between Memory and Context Window?",
        opts: ["Identical", "Memory ⊂ Context Window", "Context Window ⊂ Memory", "Unrelated"],
        ans: _A1, exp: "Context Window is the container, Memory is one block within. Context Window also contains System Prompt, Project, Skill, conversation history, etc." },
      { q: "Which item belongs better in Memory rather than Project?",
        opts: ["A course syllabus", "Your long-term work background and preferences", "Source code of a project", "Content of a specific PDF"],
        ans: _A1, exp: "Memory suits 'long-term shape of who you are'. Task details belong in Project, not Memory." },
      { q: "What is the main difference between Skill and KB?",
        opts: ["Skill is more expensive", "Skill encapsulates execution flow, KB encapsulates knowledge content", "Identical", "KB is newer"],
        ans: _A1, exp: "Skill is the constitution of 'how to do', KB is the asset of 'what to know'. Different in nature, complementary." },
      { q: "What's the difference between meta-knowledge KB and a regular domain KB?",
        opts: ["No difference", "Meta-knowledge covers methodology, longer lifecycle", "Meta-knowledge is shorter", "Meta-knowledge only for AI"],
        ans: _A1, exp: "Meta-knowledge KB covers 'how to use tools' methodology, influencing all future decisions, with a longer lifecycle than domain KBs." }
    ],

    // ============ M3 ============
    m3_nav: "3. Token Economics",
    m3_title: "Weighing One-Time, Cumulative, and Startup Costs",
    m3_overview: "Looking at single-instance cost misleads; look at lifecycle total cost. Investing in structure (Skill, KB) equals trading one-time cost for unlimited reuse dividend.",
    m3_highlights: ["Three Cost Types", "Lifecycle View", "Counter-Intuitive Truths", "Invest vs. Throwaway"],
    m3_p1: "Token costs come in three types. One-time costs come from reading SKILL.md or loading KB — pay once, reuse many times. Cumulative costs come from growing conversation history and repeated spec restatements. Startup costs come from Project loading or Memory injection — present at the start of every conversation. These three differ in time distribution, determining their optimal use scenarios.",
    m3_p2: "A counter-intuitive truth: Skills usually save tokens, not consume them — because they replace the cumulative cost of realigning specs every time. Likewise, Code usually saves tokens, not consumes them — large files don't enter context. Project has high startup cost but long-term savings, suiting stable contexts not one-off tasks. Looking at single-instance cost misleads; look at lifecycle total cost. A SKILL.md read costs 5000 tokens once, but saves 2000 tokens per turn across 20 subsequent turns — total ledger: massive savings.",
    m3_p3: "The highest form of token economics is 'structured investment'. Writing specs into Skill, organising material into KB, delegating tasks to Code, placing context into Project — all are one-time investments traded for endless future savings and precision. When you judge by lifecycle total cost rather than single-instance cost, your workflow naturally evolves toward maximum efficiency. The ultimate criterion: what is the payback period? If similar tasks will be done 3+ times, investing in Skill or KB is almost always worth it; only once — don't bother.",
    m3_wrapup: "Token economics is not penny-pinching cleverness, but the core logic of workflow design. Every decision — Chat or Project, Skill or live conversation, Code or manual — is underpinned by token economics. Understanding it upgrades your decisions from intuition to calculation.",

    m3_terms: [
      { front: "One-time Cost", back: "Reading SKILL.md, loading KB — 'pay once, reuse many'. Investment-type spending." },
      { front: "Cumulative Cost", back: "Growing conversation history, repeated spec restatement. Hidden cost source in long conversations." },
      { front: "Startup Cost", back: "Project loading, Memory injection — costs present at every conversation start." },
      { front: "Skill Economics", back: "Skills usually save tokens, not consume them, because they replace per-turn spec realignment costs." },
      { front: "Code Economics", back: "Code usually saves tokens — large files don't enter context, only results return to conversation." },
      { front: "Lifecycle Total Cost", back: "Sum of all token expenditure across the task's lifecycle. Better reflects real efficiency than single-instance cost." }
    ],

    m3_q: [
      { q: "Why do 'Skills usually save tokens'?",
        opts: ["Skills are cheaper", "They replace per-turn spec realignment cumulative cost", "They shorten conversations", "They skip system checks"],
        ans: _A1, exp: "A Skill is loaded once, but replaces the cumulative cost of restating specs every turn. The longer the conversation, the greater the saving." },
      { q: "Why does 'looking at single-instance cost mislead'?",
        opts: ["Single cost is inaccurate", "Lifecycle total cost is what matters", "Token math is wrong", "Anthropic hides info"],
        ans: _A1, exp: "One-time investments (Skill, KB) look expensive single-instance but get reused many times within the lifecycle — total ledger reverses. Use the lifecycle view." },
      { q: "What is the token characteristic of Project?",
        opts: ["Completely free", "Medium-high startup, low cumulative", "Pure waste", "Equals Memory"],
        ans: _A1, exp: "Project loads project content at every conversation start (higher startup), but no need to repeat background mid-conversation (lower cumulative). Good for stable context." },
      { q: "Which is NOT a structured investment?",
        opts: ["Writing specs into Skill", "Organising material into KB", "Delegating tasks to Code", "Restating requirements every conversation"],
        ans: _A3, exp: "Restating requirements is typical 'cumulative cost' — exactly what structured investment avoids. The first three are one-time investments for reuse dividend." }
    ],

    // ============ M4 ============
    m4_nav: "4. Role of Code Execution",
    m4_title: "Essential Difference Between Thinking and Doing Tasks",
    m4_overview: "Code is the tool of doing, not thinking. Use it when something must actually be produced; don't use it when you need to think something through.",
    m4_highlights: ["Thinking vs. Doing", "Skill + Code Pairing", "Scale Problems → Code", "100-File Law", "Reach Depends on Interface"],
    m4_p1: "Whether to use Code maps to a deeper question: is this task's essence 'thinking' or 'doing'? Thinking-tasks include understanding, explaining, discussing, deciding, creating — best handled in conversation mode. Doing-tasks include calculation, file conversion, processing large data, generating files — best handled in Code mode. Confusing these creates problems: thinking-tasks forced into Code = waste; doing-tasks denied Code = errors and burned tokens.",
    m4_p2: "Code is mandatory when: generating binary files (docx, xlsx, pptx, pdf), precise numerical computation and statistics, batch file operations, chart generation, deployment and Git operations. Strongly recommended for: long-document programmatic processing, big data but only need highlights, repetitive operations. Code is NOT for: pure conversation and writing, code-for-the-user-to-take-away (when no execution verification needed), simple logical reasoning. The trick is to ask yourself: does this task 'need to be thought through' or 'need to be actually produced'?",
    m4_p3: "Skill and Code are not competing tools but a perfect pairing. Code does the dirty work, Skill produces the polished output. Example: Code reads 30 PDFs, runs word frequency, generates statistics; the docx Skill wraps results into a formal report. A deeper criterion is the '100-file law': if this task had 100 items to process, would it collapse? Yes → use Code; no → use Chat + Skill. Three: bearable; thirty: painful; one hundred: certain collapse — this simple question yields 90% correct judgments. One critical final correction: Code is a 'capability' not an 'interface' — it exists in every interface, but its scope of action is determined by the interface. Claude.ai web's Code only acts on uploaded files in the cloud container; Cowork's Code can act on user-authorised local folders; CLI's Code runs fully native on local. So 'should I use Code' and 'which interface' are two independent questions — don't conflate them.",
    m4_wrapup: "Code is the tool of doing, not thinking. Don't kill a chicken with a battle-axe; don't dig a tunnel with a toothpick — choosing the right tool is the most concrete embodiment of token economics. When you start classifying tasks as 'thinking' or 'doing', and understand 'Code's reach depends on the interface', your workflow efficiency jumps a level.",

    m4_terms: [
      { front: "Thinking Tasks", back: "Understanding, explaining, deciding, creating — 'need to be thought through'. Conversation mode is best." },
      { front: "Doing Tasks", back: "Computation, conversion, batch, file production — 'need to be actually produced'. Code mode is best." },
      { front: "Skill + Code Combo", back: "Code does dirty work, Skill polishes output. The core configuration of a semi-agent workflow." },
      { front: "100-File Law", back: "Would this task collapse with 100 items? If yes, use Code; if no, use Chat + Skill." },
      { front: "Binary Output", back: "Non-text files like docx, xlsx, pptx, pdf. Must go through Code; cannot be produced by conversation alone." },
      { front: "Scale-Intensive", back: "Tasks requiring repetition, checking, batching. Code's home turf." },
      { front: "Brain-Intensive", back: "Tasks requiring creation, judgment, design. Home turf of Chat + Skill + Project." }
    ],

    m4_q: [
      { q: "Which task best suits Code?",
        opts: ["Write a 500-word article", "Explain what React is", "Batch process 50 CSV files", "Discuss career direction"],
        ans: _A2, exp: "Batch processing large file counts is a textbook doing-task; Code is optimal. The other three are thinking-tasks better suited to conversation mode." },
      { q: "What is the '100-File Law'?",
        opts: ["You're charged after 100 files", "Ask whether the task collapses at 100 items; if yes, use Code", "Code handles max 100 files", "Skills max at 100"],
        ans: _A1, exp: "Asking 'would this collapse at 100 items?' is the simple trick to decide Code or not. Collapse → Code; no collapse → Chat + Skill." },
      { q: "What determines Code's 'scope of action'?",
        opts: ["Code's own version", "The interface (web / Cowork / CLI)", "Conversation length", "Subscription tier"],
        ans: _A1, exp: "Code is a 'capability' present in every interface, but its scope of action is determined by the interface: web acts only in cloud container, Cowork on mounted local folders, CLI fully native." },
      { q: "Which task does NOT need Code?",
        opts: ["Generate a .docx report", "Batch update 50 HTML files", "Explain what Semi-Agent means", "Run statistics and produce charts"],
        ans: _A2, exp: "'Explain Semi-Agent' is a pure thinking-task — conversation mode suffices. The other three require actual execution and must use Code." }
    ],

    // ============ M5 ============
    m5_nav: "5. Semi-Agent Workflow",
    m5_title: "From Tool-Use to Autonomous Execution",
    m5_overview: "Semi-Agent is the sweet spot of 'human defines goals + AI executes autonomously'. SKILL.md is essentially the constitution of a micro-agent.",
    m5_highlights: ["Agent Spectrum", "Level 2 Sweet Spot", "Inward Autonomy", "Skill as Constitution"],
    m5_p1: "The Agent spectrum has five levels, from shallow to deep. Level 0 Pure Conversation — you ask, I answer; all decisions sit with the user. Level 1 Tool Use — AI actively searches, reads files, runs code, but each step is still 'user commands, I execute one action'. Level 2 Semi-Agent — AI loads Skills, internalises specs and flow, and self-decides multi-step task sequences within the user-defined task scope. Level 3 Agent — AI has persistent goals, self-schedules subtasks, proactively reports or initiates. Level 4 Autonomous Agent — long-running, cross-goal, self-prioritising.",
    m5_p2: "The defining trait of Semi-Agent is 'inward autonomy, outward control'. Inward: AI autonomously executes multi-step tasks — reading SKILL.md, scanning folder, generating output, writing back — without step-by-step user commands. Outward: tasks are initiated and terminated by the user — you say 'make a SPA' and AI starts; when done, AI stops. This semi-autonomous quality preserves user control while releasing AI's execution power. It is currently the most practical workflow type. To identify your workflow's Level, ask: is the AI doing things you didn't explicitly command but the task requires?",
    m5_p3: "SKILL.md is essentially the constitution of a micro-agent. Each refinement trains the semi-agent to behave more stably with less user intervention. In other words: you're not 'using' AI, you're 'designing' a small agent system. To push from Semi-Agent to Level 3 Agent, three things are needed: trigger mechanisms (webhook, schedule, file-change detection) for self-starting tasks; cross-task memory (execution state, pending list); autonomy-boundary judgment (when to act, when to ask). Claude Code or self-built agent frameworks can do this — but Chat + Skill + Cowork deliberately stops at Semi-Agent for a reason: preserve control, prevent AI overreach.",
    m5_wrapup: "You are not merely a user of AI; you are the designer of AI workflows. Every SKILL.md is a micro-agent's constitution; every tool combination is a workflow architecture decision. Semi-Agent is not a technical term but a design philosophy for humans and AI to share roles properly.",

    m5_terms: [
      { front: "Agent Spectrum", back: "Five levels from Level 0 Pure Conversation to Level 4 Autonomous Agent. Semi-Agent sits at Level 2." },
      { front: "Semi-Agent", back: "Level 2, multi-step autonomy inside user-defined task scope. Inward autonomy, outward control." },
      { front: "Inward Autonomy", back: "AI autonomously executes multi-step tasks without step-by-step user commands." },
      { front: "Outward Control", back: "Task initiation and termination remain in the user's hands. AI doesn't self-jump across tasks." },
      { front: "SKILL.md Constitution", back: "Each refinement trains the micro-agent to behave more stably. SKILL.md is the semi-agent's constitution." },
      { front: "Level 3 Agent", back: "Persistent goals, self-scheduling subtasks, proactive initiation. Needs triggers, cross-task memory, autonomy boundaries." },
      { front: "Sweet Spot", back: "Semi-Agent is today's most practical sweet spot — releases AI execution power while preserving user control." }
    ],

    m5_q: [
      { q: "Where does Semi-Agent sit on the Agent spectrum?",
        opts: ["Level 0", "Level 1", "Level 2", "Level 4"],
        ans: _A2, exp: "Level 0 Pure Conversation; Level 1 Tool Use; Level 2 Semi-Agent; Level 3 Agent; Level 4 Autonomous Agent. Semi-Agent is Level 2." },
      { q: "What is the defining trait of Semi-Agent?",
        opts: ["Fully autonomous", "Fully controlled", "Inward autonomous, outward controlled", "Fully random"],
        ans: _A2, exp: "Semi-Agent is autonomous within the task (inward), but task start/stop is user-controlled (outward). That is its core trait." },
      { q: "What is the essence of SKILL.md?",
        opts: ["A user guide", "A micro-agent's constitution", "AI's source code", "A conversation script"],
        ans: _A1, exp: "SKILL.md is the semi-agent's constitution — each refinement trains agent behaviour to be more stable, reducing user-intervention needs." },
      { q: "What is NOT needed to push from Semi-Agent to Level 3 Agent?",
        opts: ["Trigger mechanism", "Cross-task memory", "Autonomy boundary judgment", "Larger context window"],
        ans: _A3, exp: "Advancing to Level 3 requires triggers, cross-task memory, and boundary judgment. Context-window size isn't critical — what matters is autonomous task launch and management." }
    ],

    // ============ M6 ============
    m6_nav: "6. Operational Skills & Batch Tasks",
    m6_title: "Completing the Workflow from Creation End to Scale End",
    m6_overview: "An AI workflow needs to optimise not only creation but also scale. Operational skills are the other half of a semi-agent workflow, giving the system self-healing capability.",
    m6_highlights: ["Creation vs. Operations", "Batch Task Criterion", "spa-consistency-check", "Self-Healing System"],
    m6_p1: "Most skills today cluster at the 'creation end' — turning nothing into something, materials into output. For example: note-to-kb turns notes into KB, kb-to-quiz turns KB into quiz, interactive-learning-spa turns spec into SPA. But work is not only creation — there's also maintaining existing outputs. When the spec updates, how do older outputs catch up? When folder structures drift, how to audit? These maintenance, check, and batch-update tasks are what operational skills solve.",
    m6_p2: "Creation and operational skills differ in nature across five dimensions. Input: creation takes raw material, operations takes existing output. Output: creation makes new artefacts, operations makes report + corrected files. Task nature: creation is thinking (understand, design), operations is doing (scan, compare, modify). Need for Code: creation typically does not need it, operations typically does. Trigger frequency: creation triggers per new task, operations triggers per spec update or periodic audit. Creation skills cure 'reinventing the wheel'; operational skills cure 'mechanical repetition'.",
    m6_p3: "spa-consistency-check is a canonical example of an operational skill. It scans all SPA HTML files in a folder, checks consistency against the latest interactive-learning-spa spec, produces a Markdown report, and helps the user update non-compliant files via 'item-by-item interactive patching'. When you have both creation-type (produces SPA) and operational-type (maintains SPA) skills, an interesting property emerges — the workflow becomes self-healing. Change the spec → run consistency-check to find non-compliant → run batch-update to patch — the whole system auto-catches-up to the new standard. This pushes Level 2 Semi-Agent a small step toward Level 3 Agent.",
    m6_wrapup: "The complete form of an AI workflow needs optimisation at both ends: creation + operations. Creation skills solve the 'zero-to-one' problem; operational skills solve the 'one-to-N consistency' problem. Once both ends are built, your semi-agent workflow approaches full automation — and the starting point is usually the development of your first operational skill.",

    m6_terms: [

// ════════ FlipCardDeck ════════
const FlipCardDeck = ({ terms, t, moduleId, onCardRead, initialRead, initialShown }) => {
  const [groupIdx, setGroupIdx] = useState(0);
  const [flipped, setFlipped] = useState({});
  // 從 analytics 還原已讀/已顯示的原始 index(切換 module 不再歸零)
  const [readSet, setReadSet] = useState(() => new Set(initialRead || []));
  const [shownSet, setShownSet] = useState(() => new Set(initialShown || []));

  const [shuffledOrder] = useState(() =>
    [...Array(terms.length).keys()].sort(() => Math.random() - 0.5)
  );

  const groupSize = 2;
  const totalGroups = Math.ceil(terms.length / groupSize);
  const startIdx = groupIdx * groupSize;
  const currentCardIndices = shuffledOrder.slice(startIdx, startIdx + groupSize);

  useEffect(() => {
    const newShown = new Set(shownSet);
    currentCardIndices.forEach(idx => newShown.add(idx));
    if (newShown.size !== shownSet.size) {
      setShownSet(newShown);
      // 即時同步到 analytics,讓 M9 能立刻看到「已顯示」更新
      if (onCardRead) onCardRead(moduleId, [...readSet], [...newShown], terms.length);
    }
  }, [groupIdx]);

  const handleFlip = (origIdx) => {
    setFlipped(f => ({ ...f, [origIdx]: !f[origIdx] }));
    if (!readSet.has(origIdx)) {
      const newRead = new Set(readSet); newRead.add(origIdx); setReadSet(newRead);
      if (onCardRead) onCardRead(moduleId, [...newRead], [...shownSet], terms.length);
    }
  };

  const statusText = t.flip_status
    .replace('{read}', readSet.size).replace('{shown}', shownSet.size).replace('{total}', terms.length);

  return (
    <div className="mt-8">
      <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-2">{t.key_terms}</h3>
      <p className="text-sm text-slate-400 mb-4">{statusText}</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {currentCardIndices.map((origIdx) => {
          const term = terms[origIdx];
          return (
            <div key={origIdx} className="perspective cursor-pointer h-36" onClick={() => handleFlip(origIdx)}>
              <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped[origIdx] ? 'rotate-y-180' : ''}`}>
                <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
                  <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{term.front}</p>
                  <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
                </div>
                <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
                  <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{term.back}</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex items-center gap-3 mt-4">
        <button onClick={() => { setGroupIdx(0); setFlipped({}); }}
          className="px-4 py-2 text-sm border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
          {t.flip_retry}
        </button>
        <button onClick={() => groupIdx < totalGroups-1 && setGroupIdx(groupIdx+1)}
          disabled={groupIdx >= totalGroups-1}
          className="px-4 py-2 text-sm bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
          {t.flip_next}
        </button>
      </div>
    </div>
  );
};

// ════════ ModuleQuiz ════════
const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit, moduleName, initialSelected, initialSubmitted }) => {
  // selected: { [origQuestionIdx]: chosenOriginalOptionIdx } — 用原始 idx 為鍵,跨 session 穩定
  // submittedSet: Set of origQuestionIdx — 已 submit 過的題目
  const [selected, setSelected] = useState(() => initialSelected ? { ...initialSelected } : {});
  const [submittedSet, setSubmittedSet] = useState(() => new Set(initialSubmitted || []));
  const [groupIdx, setGroupIdx] = useState(0);
  const groupSize = 2;

  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5)
  );
  const totalGroups = Math.ceil(quizIndices.length / groupSize);

  // 每題的選項洗牌:shuffledMaps[displayIdx] = [origOptIdx, origOptIdx, ...]
  // 用 quizIndices[displayIdx] 對應到原始題目
  const [shuffledMaps] = useState(() =>
    quizIndices.map(qIdx => {
      const n = questions[qIdx].opts.length;
      return [...Array(n).keys()].sort(() => Math.random() - 0.5);
    })
  );

  // statusText:用持久化 state 計算累積進度
  const totalAnswered = Object.keys(selected).length;
  const computeCorrect = () => {
    let c = 0;
    Object.entries(selected).forEach(([origQIdx, chosenOrigOptIdx]) => {
      if (chosenOrigOptIdx === _d(questions[origQIdx].ans)) c++;
    });
    return c;
  };
  const statusText = t.quiz_status
    .replace('{correct}', computeCorrect())
    .replace('{answered}', totalAnswered)
    .replace('{total}', quizIndices.length);

  const currentStart = groupIdx * groupSize;
  const currentIndices = quizIndices.slice(currentStart, currentStart + groupSize);
  // 判斷當前 group 是否已 submit:該 group 所有題目都在 submittedSet 內
  const isCurrentGroupSubmitted = currentIndices.every(qIdx => submittedSet.has(qIdx));

  const handleGroupSubmit = () => {
    const allDone = currentIndices.every(qIdx => selected[qIdx] !== undefined);
    if (!allDone) return;
    const newSubmitted = new Set(submittedSet);
    currentIndices.forEach(qIdx => newSubmitted.add(qIdx));
    setSubmittedSet(newSubmitted);

    // 計算累積結果,只算已 submit 的題目
    const wrongQs = [];
    let correct = 0;
    let answered = 0;
    newSubmitted.forEach(qIdx => {
      const chosen = selected[qIdx];
      if (chosen === undefined) return;
      answered++;
      if (chosen === _d(questions[qIdx].ans)) correct++;
      else wrongQs.push(questions[qIdx].q);
    });
    // 多傳 selected 與已 submit 陣列,讓 App 端持久化
    onQuizSubmit(moduleId, correct, answered, wrongQs, moduleName, { ...selected }, [...newSubmitted]);
  };

  const handleRetry = () => {
    setGroupIdx(0);
    setSelected({});
    setSubmittedSet(new Set());
    // 同步清空 analytics 內這模組的 quiz 進度
    onQuizSubmit(moduleId, 0, 0, [], moduleName, {}, []);
  };

  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-2">{t.quiz_title}</h3>
      <p className="text-sm text-slate-400 mb-6">{statusText}</p>
      {currentIndices.map((qIdx, localI) => {
        const qi = currentStart + localI;
        const q = questions[qIdx];
        const sMap = shuffledMaps[qi];
        const isQuestionSubmitted = submittedSet.has(qIdx);
        const userChoiceOrig = selected[qIdx];  // 原始選項 idx
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-bold mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">
              {sMap.map((origOptIdx, dIdx) => {
                const isCorrect = origOptIdx === _d(q.ans);
                const isSel = userChoiceOrig === origOptIdx;
                return (
                  <button key={dIdx} onClick={() => !isQuestionSubmitted && setSelected(s => ({...s, [qIdx]: origOptIdx}))}
                    className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm
                      ${isQuestionSubmitted
                        ? isCorrect ? 'bg-green-100 border-green-500 dark:bg-green-900/30'
                          : isSel ? 'bg-red-100 border-red-400 dark:bg-red-900/30' : 'border-slate-200 dark:border-slate-700'
                        : isSel ? 'border-[#004030] dark:border-[#D8C3A5] bg-[#004030]/5' : 'border-slate-200 dark:border-slate-700 hover:border-slate-400'
                      }`}>
                    {q.opts[origOptIdx]}
                  </button>
                );
              })}
            </div>
            {isQuestionSubmitted && userChoiceOrig !== undefined && (
              <p className={`mt-2 text-sm italic ${
                userChoiceOrig === _d(q.ans)
                  ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400'
              }`}>
                {userChoiceOrig === _d(q.ans)
                  ? `✓ ${t.correct}` : `✗ ${t.incorrect}`} — {t.explanation}：{q.exp}
              </p>
            )}
          </div>
        );
      })}
      <div className="flex items-center gap-3">
        {!isCurrentGroupSubmitted
          ? <button onClick={handleGroupSubmit}
              disabled={!currentIndices.every(qIdx => selected[qIdx] !== undefined)}
              className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
              {t.submit}
            </button>
          : <>
              {groupIdx < totalGroups-1 && (
                <button onClick={() => setGroupIdx(groupIdx+1)}
                  className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg">
                  {t.quiz_next}
                </button>
              )}
              <button onClick={handleRetry}
                className="px-6 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] font-bold rounded-lg">
                {t.quiz_retry}
              </button>
            </>
        }
      </div>
    </div>
  );
};

        <label className="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" checked={hasCompute} onChange={e=>setHasCompute(e.target.checked)} />
          {txt.compute}
        </label>
        <div className="mt-4 p-4 bg-slate-100 dark:bg-slate-700 rounded-lg text-center">
          <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">{txt.verdict}</p>
          <p className={`text-xl font-bold ${v.color}`}>{v.text}</p>
        </div>
      </div>
    </div>
  );
};

// ════════ Lab 4: Skill 開發優先順序 ════════
const SkillPriorityLab = ({lang}) => {
  const [pain, setPain] = useState(5);
  const [stable, setStable] = useState(5);
  const [reuse, setReuse] = useState(5);
  const txt = {
    zh: { title: "Skill 開發優先順序", pain: "痛點頻率(1-10)", stable: "規格穩定性(1-10)", reuse: "預期重用次數(1-10)",

    en: { title: "Skill Development Priority", pain: "Pain frequency (1-10)", stable: "Spec stability (1-10)", reuse: "Expected reuse (1-10)",
      score: "Priority Score", high: "🔥 High priority, do now", mid: "⭐ Medium priority, schedule it", low: "💭 Low priority, observe first" }

  const score = Math.round((pain * 2 + stable + reuse * 2) / 5 * 10) / 10;

    <div className="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-4">{txt.title}</h3>

          <input type="range" min="1" max="10" value={pain} onChange={e=>setPain(+e.target.value)} className="w-full" />
        </div>
        <div>
          <label className="block text-sm mb-1">{txt.stable}: <span className="font-bold">{stable}</span></label>
          <input type="range" min="1" max="10" value={stable} onChange={e=>setStable(+e.target.value)} className="w-full" />
        </div>
        <div>
          <label className="block text-sm mb-1">{txt.reuse}: <span className="font-bold">{reuse}</span></label>
          <input type="range" min="1" max="10" value={reuse} onChange={e=>setReuse(+e.target.value)} className="w-full" />
        </div>
        <div className="mt-4 p-4 bg-slate-100 dark:bg-slate-700 rounded-lg text-center">
          <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">{txt.score}: {score}</p>
          <p className="text-lg font-bold text-[#004030] dark:text-[#D8C3A5]">{verdict}</p>
        </div>
      </div>
