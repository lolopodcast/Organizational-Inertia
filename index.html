};

// ════════ Module Meta ════════
const modulesList = [
  { id: 0, title: '', icon: '🏠', num: '0' },
  { id: 1, title: '', icon: '🧩', num: '1' },
  { id: 2, title: '', icon: '🧠', num: '2' },
  { id: 3, title: '', icon: '⚖️', num: '3' },
  { id: 4, title: '', icon: '⚡', num: '4' },
  { id: 5, title: '', icon: '🤖', num: '5' },
  { id: 6, title: '', icon: '🔧', num: '6' },
  { id: IDX_LAB, title: '', icon: '🧪', num: '7' },
  { id: IDX_RES, title: '', icon: '🌐', num: '8' },
  { id: IDX_ANA, title: '', icon: '📊', num: '9' }
];

// ════════ App ════════
function App() {
  const LS_KEY = 'AIWF_SPA_analytics';
  const LS_STU = 'AIWF_SPA_student';
  const loadLS = (key, fb) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch { return fb; } };

  const [lang, setLang] = useState('en');
  const [isDark, setIsDark] = useState(true);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState(() => loadLS(LS_STU, { group:'', dept:'', id:'', nameEn:'', nameZh:'' }));
  const [analytics, setAnalytics] = useState(() => {
    // 預設空 schema
    const empty = {
      time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
      quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0),
      cardsRead: Array(TOTAL).fill(0), cardsShown: Array(TOTAL).fill(0), cardsTotal: Array(TOTAL).fill(0),
      // 用 object map 持久化已讀/已顯示的原始 index,讓 FlipCardDeck 重新掛載時能還原進度
      cardsReadIdx: {}, cardsShownIdx: {},
      // 持久化 quiz 答題狀態(per module: { selected, submitted })
      quizState: {},
      wrongTopics: {}
    };
    const loaded = loadLS(LS_KEY, null);
    if (!loaded) return empty;
    // Schema migration:對舊版 localStorage 補齊缺失欄位,避免 [...undefined] crash
    Object.keys(empty).forEach(k => {
      if (loaded[k] === undefined) loaded[k] = empty[k];
    });
    // 額外保險:若陣列長度與 TOTAL 不符(例如曾經改過模組數),也要重設為當前 TOTAL
    ['time','clicks','quizCorrect','quizTotal','cardsRead','cardsShown','cardsTotal'].forEach(k => {
      if (!Array.isArray(loaded[k]) || loaded[k].length !== TOTAL) loaded[k] = empty[k];
    });
    ['wrongTopics','cardsReadIdx','cardsShownIdx','quizState'].forEach(k => {
      if (typeof loaded[k] !== 'object' || loaded[k] === null) loaded[k] = {};
    });
    return loaded;
  });
  const menuRef = useRef(null);
  const t = dict[lang];

  // Module list with translated titles
  const ml = modulesList.map((m, i) => ({
    ...m,
    title: i === 0 ? t.m0_nav :
      i <= NUM_LEARN ? t[`m${i}_nav`] :
      i === IDX_LAB ? t.mlab_nav :
      i === IDX_RES ? t.mres_nav : t.analytics_title
  }));

  useEffect(() => { document.documentElement.classList.toggle('dark', isDark); }, [isDark]);
  useEffect(() => { try { localStorage.setItem(LS_KEY, JSON.stringify(analytics)); } catch {} }, [analytics]);
  useEffect(() => { try { localStorage.setItem(LS_STU, JSON.stringify(studentInfo)); } catch {} }, [studentInfo]);

  // Time tracker
  useEffect(() => {
    const interval = setInterval(() => {
      setAnalytics(a => {
        const newTime = [...(a.time || Array(TOTAL).fill(0))];
        newTime[module] = (newTime[module] || 0) + 1;
        return { ...a, time: newTime };
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [module]);

  // Click tracker
  useEffect(() => {
    const handler = () => {
      setAnalytics(a => {
        const newClicks = [...(a.clicks || Array(TOTAL).fill(0))];
        newClicks[module] = (newClicks[module] || 0) + 1;
        return { ...a, clicks: newClicks };
      });
    };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, [module]);

  // Menu outside click
  useEffect(() => {
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
    };
    if (menuOpen) document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);

  // Quiz handler (= 覆蓋)
  const handleQuizSubmit = (mid, correct, answered, wrongQs, moduleName, selectedMap, submittedArr) => {
    setAnalytics(a => {
      const qc = [...(a.quizCorrect || Array(TOTAL).fill(0))];
      const qt = [...(a.quizTotal || Array(TOTAL).fill(0))];
      qc[mid] = correct; qt[mid] = answered;
      const wt = { ...(a.wrongTopics || {}) }; wt[mid] = wrongQs || [];
      // 持久化 quiz 答題狀態(原始 question idx → 原始 option idx),供 ModuleQuiz 還原
      const qs = { ...(a.quizState || {}) };
      qs[mid] = { selected: selectedMap || {}, submitted: submittedArr || [] };
      return { ...a, quizCorrect: qc, quizTotal: qt, wrongTopics: wt, quizState: qs };
    });
  };

  const handleCardRead = (mid, readArr, shownArr, totalCount) => {
    setAnalytics(a => {
      const cr = [...(a.cardsRead || Array(TOTAL).fill(0))];
      const cs = [...(a.cardsShown || Array(TOTAL).fill(0))];
      const ct = [...(a.cardsTotal || Array(TOTAL).fill(0))];
      const cri = { ...(a.cardsReadIdx || {}) };
      const csi = { ...(a.cardsShownIdx || {}) };
      cr[mid] = readArr.length; cs[mid] = shownArr.length; ct[mid] = totalCount;
      cri[mid] = readArr; csi[mid] = shownArr;
      return { ...a, cardsRead: cr, cardsShown: cs, cardsTotal: ct, cardsReadIdx: cri, cardsShownIdx: csi };
    });
  };

  // TTS
  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { speechSynthesis.resume(); setTtsState('playing'); return; }
      speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      let texts = [];
      if (module === 0) {
        texts = [t.m0_title, t.m0_intro, t.m0_why, t.m0_why_desc,
          ...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),
          ...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)
        ];
      } else if (module >= 1 && module <= NUM_LEARN) {
        const mk = `m${module}`;
        texts = [t[`${mk}_title`], t[`${mk}_overview`],
          ...(t[`${mk}_highlights`]||[]),
          t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`],
          t[`${mk}_wrapup`],
          ...(t[`${mk}_terms`]||[]).flatMap(tm=>[tm.front, tm.back])
        ];
      } else if (module === IDX_LAB) {
        texts = [t.mlab_title, t.mlab_desc, ...(t.mlab_labs||[]).map(l=>`${l.title}. ${l.desc||''}`)];
      } else if (module === IDX_RES) {
        texts = [t.mres_title, t.mres_desc];
      } else if (module === IDX_ANA) {
        const tc = analytics.quizCorrect.reduce((a,b)=>a+b,0);
        const ta = analytics.quizTotal.reduce((a,b)=>a+b,0);
        const oa = ta>0 ? Math.round(tc/ta*100) : 0;
        const wk = [];
        for (let i=1;i<=NUM_LEARN;i++) {
          if (analytics.quizTotal[i]>0) {
            const a = Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100);
            if (a<75) wk.push({name: ml[i].title, acc:a});
          }
        }
        wk.sort((a,b)=>a.acc-b.acc);
        texts = [t.analytics_title, t.analytics_desc,
          `${t.analytics_total_time}: ${analytics.time.reduce((a,b)=>a+b,0)}${t.analytics_sec}`,
          `${t.analytics_total_clicks}: ${analytics.clicks.reduce((a,b)=>a+b,0)}${t.analytics_times}`,
          `${t.analytics_overall_acc}: ${oa}%`
        ];
        if (wk.length) { texts.push(t.analytics_wp_tts_intro); wk.forEach(w=>texts.push(t.analytics_wp_tts_module.replace('{name}',w.name).replace('{acc}',w.acc))); }
        else if (ta>0) texts.push(t.analytics_wp_tts_allpass);
      }
      texts = texts.filter(Boolean);
      const utt = new SpeechSynthesisUtterance(texts.join(sep));
      utt.rate = 0.95;
      const voices = speechSynthesis.getVoices();
      if (lang==='zh') {
        const v = voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));
        if (v) utt.voice = v; utt.lang = 'zh-TW';
      } else {
        const v = voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));
        if (v) utt.voice = v; utt.lang = 'en-GB';
      }
      utt.onend = () => setTtsState('idle');
      utt.onerror = () => setTtsState('idle');
      speechSynthesis.speak(utt);
      setTtsState('playing');
    }
  };

  // CSV export
  const allInfoFilled = studentInfo.group && studentInfo.dept && studentInfo.id && studentInfo.nameEn && studentInfo.nameZh;
  const exportCSV = () => {
    if (!allInfoFilled) return;
    const BOM = '\uFEFF';
    // 欄位 header 依當前語言切換,且每個數字獨立分欄(避免 Excel 把 "3/5/8" 誤判為日期)
    const headers = lang === 'zh'
      ? ['模組','停留時間(秒)','點擊次數','學習卡_已讀','學習卡_已顯示','學習卡_總計','測驗_答對','測驗_已填答','測驗_總題數','答錯題目']
      : ['Module','Time(s)','Clicks','Cards_Read','Cards_Shown','Cards_Total','Quiz_Correct','Quiz_Answered','Quiz_Total','Wrong_Questions'];
    let csv = BOM + headers.join(',') + '\n';
    for (let i = 0; i < TOTAL; i++) {
      const wq = (analytics.wrongTopics[i]||[]).join(' | ').replace(/"/g, '""');
      const mName = ml[i].title.replace(/,/g, ' ');
      const isLearn = i >= 1 && i <= NUM_LEARN;
      const cardTot = isLearn ? (t[`m${i}_terms`]?.length || 0) : '';
      const quizTot = isLearn ? (t[`m${i}_q`]?.length || 0) : '';
      // 學習卡 / 測驗欄位:M0、M7-9 留空(該模組沒有學習卡或測驗)
      const cardRead = isLearn ? (analytics.cardsRead[i]||0) : '';
      const cardShown = isLearn ? (analytics.cardsShown[i]||0) : '';
      const quizCorrect = isLearn ? (analytics.quizCorrect[i]||0) : '';
      const quizAnswered = isLearn ? (analytics.quizTotal[i]||0) : '';
      csv += `"${mName}",${analytics.time[i]||0},${analytics.clicks[i]||0},${cardRead},${cardShown},${cardTot},${quizCorrect},${quizAnswered},${quizTot},"${wq}"\n`;
    }
    const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date();
    const ymd = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
    // 檔名依當前語言取對應 brand 與 title
    const fn = `${t.brand}.${t.title}_${studentInfo.nameEn} ${studentInfo.nameZh}_${ymd}.csv`;
    a.href = url; a.download = fn; a.click();
    URL.revokeObjectURL(url);
  };

  const clearAnalytics = () => {
    if (confirm(t.analytics_wp_clear_confirm)) {
      setAnalytics({
        time: Array(TOTAL).fill(0), clicks: Array(TOTAL).fill(0),
        quizCorrect: Array(TOTAL).fill(0), quizTotal: Array(TOTAL).fill(0),
        cardsRead: Array(TOTAL).fill(0), cardsShown: Array(TOTAL).fill(0), cardsTotal: Array(TOTAL).fill(0),
        cardsReadIdx: {}, cardsShownIdx: {},
        quizState: {},
        wrongTopics: {}
      });
    }
  };

  // ════════ Render Module Content ════════
  const renderModule = () => {
    if (module === 0) {
      // M0 Executive Summary
      return (
        <div className="space-y-8 animate-fade-in">
          <div className="text-center py-8">
            <h1 className="text-4xl md:text-6xl font-serif font-black text-[#004030] dark:text-[#D8C3A5] mb-4">{t.m0_title}</h1>
            <p className="text-lg text-slate-600 dark:text-slate-400 max-w-3xl mx-auto">{t.subtitle}</p>
          </div>
          <div className="bg-gradient-to-br from-[#004030] to-[#004030]/80 dark:from-slate-800 dark:to-slate-900 text-white rounded-2xl p-8 shadow-xl">
            <p className="text-base md:text-lg leading-relaxed text-[#D8C3A5]/95">{t.m0_intro}</p>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {t.m0_stats.map((s,i)=>(
              <div key={i} className="bg-white dark:bg-slate-800 rounded-xl p-5 text-center border border-slate-200 dark:border-slate-700">
                <p className="text-3xl md:text-4xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
                <p className="text-xs uppercase tracking-wider text-slate-500 mt-1">{s.label}</p>
              </div>
            ))}
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border-l-4 border-[#D8C3A5]">
            <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-3">{t.m0_why}</h3>
            <p className="text-slate-700 dark:text-slate-300">{t.m0_why_desc}</p>
          </div>
          <div>
            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">{t.nav_modules}</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {t.m0_modules.map((m,i)=>(
                <button key={i} onClick={()=>{setModule(i+1); window.scrollTo({top:0,behavior:'smooth'});}}
                  className="text-left bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:shadow-md transition-all group">
                  <div className="flex items-center gap-3 mb-1">
                    <span className="font-serif font-black text-[#D8C3A5] text-xl">{m.num}</span>
                    <span className="font-bold text-[#004030] dark:text-[#D8C3A5]">{m.title}</span>
                  </div>
                  <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">{m.desc}</p>
                </button>
              ))}
            </div>
          </div>
          <div className="text-center">
            <button onClick={()=>{setModule(1); window.scrollTo({top:0,behavior:'smooth'});}}
              className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-full text-lg shadow-lg hover:shadow-xl transition-all">
              {t.m0_start}
            </button>
          </div>
        </div>
      );
    }

    if (module >= 1 && module <= NUM_LEARN) {
      const mk = `m${module}`;
      return (
        <div className="space-y-6 text-base md:text-lg leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in">
          <H2 icon={ml[module].icon} number={ml[module].num}>{t[`${mk}_title`]}</H2>

          {/* Overview */}
          <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 rounded-xl p-5 border-l-4 border-[#D8C3A5]">
            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-2">{t.overview_label}</h3>
            <p>{t[`${mk}_overview`]}</p>
          </div>

          {/* Highlights */}
          <div>
            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">{t.highlights_label}</h3>
            <div className="flex flex-wrap gap-2">
              {t[`${mk}_highlights`].map((h,i)=>(
                <span key={i} className="px-3 py-1 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] rounded-full text-sm font-medium">{h}</span>
              ))}
            </div>
          </div>

          {/* Deep Dive */}
          <div>
            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">{t.deep_dive_label}</h3>
            <div className="space-y-4">
              <p>{t[`${mk}_p1`]}</p>
              <p className="p-4 bg-slate-100 dark:bg-slate-800 rounded-lg italic font-serif border-l-4 border-[#D8C3A5]">{t[`${mk}_p2`]}</p>
              <p>{t[`${mk}_p3`]}</p>
            </div>
          </div>

          {/* SVG 圖示 - Module 相關示意圖 */}
          <div className="flex justify-center my-6">
            <svg viewBox="0 0 400 200" className="w-full max-w-md" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id={`grad-${module}`} x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#004030"/>
                  <stop offset="100%" stopColor="#D8C3A5"/>
                </linearGradient>
              </defs>
              <rect x="20" y="80" width="360" height="40" rx="20" fill={`url(#grad-${module})`} opacity="0.3"/>
              <circle cx="80" cy="100" r="30" fill="#004030"/>
              <text x="80" y="106" textAnchor="middle" fill="#D8C3A5" fontSize="14" fontWeight="bold" fontFamily="serif">M{module}</text>
              <circle cx="200" cy="100" r="25" fill="#D8C3A5"/>
              <text x="200" y="106" textAnchor="middle" fill="#004030" fontSize="12" fontWeight="bold">{module*2}x</text>
              <circle cx="320" cy="100" r="30" fill="#004030"/>
              <text x="320" y="106" textAnchor="middle" fill="#D8C3A5" fontSize="14" fontWeight="bold">✓</text>
            </svg>
          </div>

          {/* FlipCards */}
          <FlipCardDeck
            key={`cards-${module}`}
            terms={t[`${mk}_terms`]}
            t={t}
            moduleId={module}
            onCardRead={handleCardRead}
            initialRead={analytics.cardsReadIdx?.[module] || []}
            initialShown={analytics.cardsShownIdx?.[module] || []}
          />

          {/* Wrap-up */}
          <div className="bg-slate-100 dark:bg-slate-800 rounded-xl p-5">
            <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-2">{t.wrapup_label}</h3>
            <p className="italic">{t[`${mk}_wrapup`]}</p>
          </div>

          {/* Quiz */}
          <ModuleQuiz
            key={`quiz-${module}`}
            questions={t[`${mk}_q`]}
            t={t}
            moduleId={module}
            onQuizSubmit={handleQuizSubmit}
            moduleName={t[`${mk}_title`]}
            initialSelected={analytics.quizState?.[module]?.selected || {}}
            initialSubmitted={analytics.quizState?.[module]?.submitted || []}
          />
        </div>
      );
    }

    if (module === IDX_LAB) {
      return (
        <div className="space-y-6 animate-fade-in">
          <H2 icon={ml[IDX_LAB].icon} number={ml[IDX_LAB].num}>{t.mlab_title}</H2>
          <p className="text-slate-600 dark:text-slate-400">{t.mlab_desc}</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <ModeSelectorLab lang={lang}/>
            <TokenCalcLab lang={lang}/>
            <CodeNecessityLab lang={lang}/>
            <SkillPriorityLab lang={lang}/>
          </div>
        </div>
      );
    }

    if (module === IDX_RES) {
      const resources = lang === 'zh' ? [
        { label: "Anthropic 官方文件", url: "https://docs.claude.com", desc: "Claude 產品、API、Skill 開發、Prompt 工程完整文件" },
        { label: "Claude.ai 產品支援", url: "https://support.claude.com", desc: "使用說明、訂閱方案、功能介紹" },
        { label: "Skill 開發指南", url: "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/overview", desc: "Prompt 工程基礎,Skill 設計可參考" },
        { label: "Claude Code", url: "https://docs.claude.com", desc: "命令列工具,Level 3 Agent 的開發環境" },
        { label: "MCP (Model Context Protocol)", url: "https://docs.claude.com", desc: "外部工具與服務的整合協定" },
        { label: "Anthropic Newsroom", url: "https://www.anthropic.com/news", desc: "最新產品發布、研究進展、政策說明" }
      ] : [
        { label: "Anthropic Documentation", url: "https://docs.claude.com", desc: "Complete docs for Claude products, API, Skill development, Prompt engineering" },
        { label: "Claude.ai Support", url: "https://support.claude.com", desc: "User guide, subscription plans, feature introduction" },
        { label: "Skill Development Guide", url: "https://docs.claude.com/en/docs/build-with-claude/prompt-engineering/overview", desc: "Prompt engineering basics, reference for Skill design" },
        { label: "Claude Code", url: "https://docs.claude.com", desc: "Command-line tool, dev environment for Level 3 Agent" },
        { label: "MCP (Model Context Protocol)", url: "https://docs.claude.com", desc: "Integration protocol for external tools and services" },
        { label: "Anthropic Newsroom", url: "https://www.anthropic.com/news", desc: "Latest product releases, research progress, policy notes" }
      ];
      return (
        <div className="space-y-6 animate-fade-in">
          <H2 icon={ml[IDX_RES].icon} number={ml[IDX_RES].num}>{t.mres_title}</H2>
          <p className="text-slate-600 dark:text-slate-400">{t.mres_desc}</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {resources.map((r,i)=><LinkCard key={i} {...r}/>)}
          </div>
        </div>
      );
    }

    if (module === IDX_ANA) {
      const totalCorrect = analytics.quizCorrect.reduce((a,b)=>a+b,0);
      const totalAnswered = analytics.quizTotal.reduce((a,b)=>a+b,0);
      const overallAcc = totalAnswered>0 ? Math.round(totalCorrect/totalAnswered*100) : 0;
      const totalCardsRead = analytics.cardsRead.reduce((a,b)=>a+b,0);
      const totalCardsShown = analytics.cardsShown.reduce((a,b)=>a+b,0);
      // 總卡數從 dict 算(M1-NUM_LEARN 各模組 terms 長度加總),不依賴 state
      let totalCardsTotal = 0;
      for (let i = 1; i <= NUM_LEARN; i++) {
        totalCardsTotal += (t[`m${i}_terms`]?.length || 0);
      }
      const weakPoints = [];
      for (let i=1; i<=NUM_LEARN; i++) {
        if (analytics.quizTotal[i]>0) {
          const acc = Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100);
          if (acc<75) weakPoints.push({id:i, name:ml[i].title, acc, wrong: analytics.wrongTopics[i]||[]});
        }
      }
      weakPoints.sort((a,b)=>a.acc-b.acc);

      return (
        <div className="space-y-6 animate-fade-in">
          <H2 icon={ml[IDX_ANA].icon} number={ml[IDX_ANA].num}>{t.analytics_title}</H2>
          <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>

          {/* 統計卡 4 個 */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
              <p className="text-xs uppercase tracking-wider text-slate-500 mb-1">{t.analytics_total_time}</p>
              <p className="text-2xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{analytics.time.reduce((a,b)=>a+b,0)}{t.analytics_sec}</p>
            </div>
            <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
              <p className="text-xs uppercase tracking-wider text-slate-500 mb-1">{t.analytics_total_clicks}</p>
              <p className="text-2xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{analytics.clicks.reduce((a,b)=>a+b,0)}{t.analytics_times}</p>
            </div>
            <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
              <p className="text-xs uppercase tracking-wider text-slate-500 mb-1">{t.analytics_overall_acc}</p>
              <p className="text-2xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{overallAcc}%</p>
            </div>
            <div className="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 text-center">
              <p className="text-xs uppercase tracking-wider text-slate-500 mb-1">{t.analytics_cards_label}</p>
              <p className="text-2xl font-serif font-black text-[#004030] dark:text-[#D8C3A5]">{totalCardsRead}/{totalCardsShown}/{totalCardsTotal}</p>
              <p className="text-[10px] text-slate-400 mt-1">{t.analytics_card_read_label}/{t.analytics_card_shown_label}/{t.analytics_card_total_label}</p>
            </div>
          </div>

          {/* 整體進度 */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
            <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_progress_title}</h3>
            <div className="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-10 gap-2">
              {ml.slice(1).map((m,i)=>{
                const idx = i+1;
                const visited = (analytics.time[idx]||0) > 5;
                const quizDone = (analytics.quizTotal[idx]||0) > 0;
                return (
                  <button key={idx} onClick={()=>{setModule(idx); window.scrollTo({top:0,behavior:'smooth'});}}
                    className={`p-2 rounded-lg text-xs text-center transition-all border ${
                      quizDone ? 'bg-[#004030] text-[#D8C3A5] border-[#004030]' :
                      visited ? 'bg-[#D8C3A5]/30 border-[#D8C3A5]' :
                      'bg-slate-100 dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-500'
                    }`}>
                    <div>{m.icon}</div>
                    <div className="truncate">{m.num}</div>
                  </button>
                );
              })}
            </div>
            <div className="flex gap-4 mt-3 text-xs text-slate-500">
              <span>⬛ {t.analytics_progress_quiz_done}</span>
              <span>⬜ {t.analytics_progress_visited}</span>
              <span>▫️ {t.analytics_progress_not_visited}</span>
            </div>
          </div>

          {/* 弱點分析 */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
            <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_wp_title}</h3>
            {weakPoints.length === 0 ? (
              <p className="text-slate-600 dark:text-slate-400">{totalAnswered>0 ? t.analytics_wp_allpass : t.analytics_no_data}</p>
            ) : (
              <div className="space-y-3">
                {weakPoints.map(w=>(
                  <div key={w.id} className="border-l-4 border-red-400 bg-red-50 dark:bg-red-900/20 p-4 rounded-r-lg">
                    <p className="font-bold text-[#004030] dark:text-[#D8C3A5]">{w.name} — {w.acc}%</p>
                    {w.wrong.length>0 && (
                      <div className="mt-2 text-sm text-slate-600 dark:text-slate-400">
                        <p>{t.analytics_wp_incorrect}</p>
                        <ul className="list-disc list-inside ml-2 mt-1">
                          {w.wrong.map((q,i)=><li key={i}>{q}</li>)}
                        </ul>
                      </div>
                    )}
                    <button onClick={()=>{setModule(w.id); window.scrollTo({top:0,behavior:'smooth'});}}
                      className="mt-2 text-sm text-[#004030] dark:text-[#D8C3A5] underline">{t.analytics_wp_goto}</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* 模組明細 */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-slate-200 dark:border-slate-700 text-slate-500 text-left">
                  <th className="p-2">{t.analytics_module}</th>
                  <th className="p-2">{t.analytics_time}</th>
                  <th className="p-2">{t.analytics_clicks}</th>
                  <th className="p-2">
                    <div>{t.analytics_cards_label}</div>
                    <div className="text-[10px] font-normal normal-case">{t.analytics_card_read_label}/{t.analytics_card_shown_label}/{t.analytics_card_total_label}</div>
                  </th>
                  <th className="p-2">
                    <div>{t.analytics_quiz_label}</div>
                    <div className="text-[10px] font-normal normal-case">{t.analytics_quiz_correct_label}/{t.analytics_quiz_answered_label}/{t.analytics_quiz_total_label}</div>
                  </th>
                </tr>
              </thead>
              <tbody>
                {ml.slice(1).map((m,i)=>{
                  const idx = i+1;
                  const isLearn = idx >= 1 && idx <= NUM_LEARN;
                  const cardTot = isLearn ? (t[`m${idx}_terms`]?.length || 0) : 0;
                  const quizTot = isLearn ? (t[`m${idx}_q`]?.length || 0) : 0;
                  return (
                    <tr key={idx} className="border-b border-slate-100 dark:border-slate-700/50">
                      <td className="p-2">{m.icon} {m.title}</td>
                      <td className="p-2">{analytics.time[idx]||0}{t.analytics_sec}</td>
                      <td className="p-2">{analytics.clicks[idx]||0}</td>
                      <td className="p-2 text-slate-400">
                        {isLearn
                          ? <span className="text-slate-700 dark:text-slate-200">{analytics.cardsRead[idx]||0}/{analytics.cardsShown[idx]||0}/{cardTot}</span>
                          : '—'}
                      </td>
                      <td className="p-2 text-slate-400">
                        {isLearn
                          ? <span className="text-slate-700 dark:text-slate-200">{analytics.quizCorrect[idx]||0}/{analytics.quizTotal[idx]||0}/{quizTot}</span>
                          : '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* 基本資料表單 */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
            <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-4">{t.analytics_form_title}</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-slate-500 mb-1 block">{t.analytics_group}</label>
                <select value={studentInfo.group} onChange={e=>setStudentInfo(s=>({...s, group:e.target.value}))}
                  className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-sm">
                  <option value="">{t.analytics_group_select}</option>
                  {t.group_options.map(g=><option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-500 mb-1 block">{t.analytics_dept}</label>
                <input type="text" value={studentInfo.dept} placeholder={t.analytics_dept_ph}
                  onChange={e=>setStudentInfo(s=>({...s, dept:sanitizeName(e.target.value)}))}
                  className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-sm" />
              </div>
              <div>
                <label className="text-xs text-slate-500 mb-1 block">{t.analytics_id}</label>
                <input type="text" value={studentInfo.id} placeholder={t.analytics_id_ph}
                  onChange={e=>setStudentInfo(s=>({...s, id:sanitizeStudentId(e.target.value)}))}
                  className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-sm" />
              </div>
              <div>
                <label className="text-xs text-slate-500 mb-1 block">{t.analytics_name_en}</label>
                <input type="text" value={studentInfo.nameEn} placeholder={t.analytics_name_en_ph}
                  onChange={e=>setStudentInfo(s=>({...s, nameEn:sanitizeName(e.target.value)}))}
                  className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-sm" />
              </div>
              <div>
                <label className="text-xs text-slate-500 mb-1 block">{t.analytics_name_zh}</label>
                <input type="text" value={studentInfo.nameZh} placeholder={t.analytics_name_zh_ph}
                  onChange={e=>setStudentInfo(s=>({...s, nameZh:sanitizeName(e.target.value)}))}
                  className="w-full p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-sm" />
              </div>
            </div>
            <div className="mt-4 flex flex-wrap gap-3 items-center">
              <button onClick={exportCSV} disabled={!allInfoFilled}
                className="px-6 py-2 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40">
                {t.analytics_export_csv}
              </button>
              {!allInfoFilled && <span className="text-xs text-slate-500">{t.analytics_fill_required}</span>}
              <button onClick={clearAnalytics}
                className="px-4 py-2 text-sm border border-red-400 text-red-500 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20">
                {t.analytics_wp_clear}
              </button>
            </div>
            <p className="text-xs text-slate-500 mt-3">💾 {t.analytics_wp_saved}</p>
          </div>
        </div>
      );
    }
  };

  return (
    <div className="min-h-screen flex flex-col">
      {/* Header */}
      <header className="fixed top-0 left-0 right-0 h-16 bg-[#004030] dark:bg-slate-900 text-white z-50 shadow-lg border-b border-[#D8C3A5]/30">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="relative" ref={menuRef}>
              <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 hover:bg-white/10 rounded-lg"><IconMenu/></button>
              {menuOpen && (
                <div className="absolute top-full left-0 mt-1 w-64 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-5rem)] overflow-y-auto bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 z-[100]">
                  {ml.map(m=>(
                    <button key={m.id} onClick={()=>{setModule(m.id); setMenuOpen(false); window.scrollTo({top:0,behavior:'smooth'});}}
                      className={`w-full flex items-center gap-3 px-4 py-3 text-sm hover:bg-slate-100 dark:hover:bg-slate-700 text-left ${module===m.id?'bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] font-bold':'text-slate-700 dark:text-slate-200'}`}>
                      <span>{m.icon}</span>
                      <span className="text-[#D8C3A5] dark:text-[#D8C3A5] font-bold mr-1">{m.num}.</span>
                      <span className="truncate">{m.title}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={()=>{setModule(0); window.scrollTo({top:0,behavior:'smooth'});}} className="p-2 hover:bg-white/10 rounded-lg"><IconHome size={18}/></button>
            <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="flex items-center gap-2">
              <span className="font-serif font-black text-[#D8C3A5] text-lg tracking-widest">{t.brand}</span>
              <span className="hidden sm:inline font-serif font-bold text-sm md:text-base">{t.title}</span>
            </button>
          </div>
          <div className="flex items-center gap-1 sm:gap-2">
            {/* TTS */}
            <button onClick={()=>handleTTS(ttsState==='playing'?'pause':'play')}
              className="p-2 hover:bg-white/10 rounded-lg" title={t.audio_read}>
              {ttsState==='playing' ? <IconPause size={16}/> : <IconPlay size={16}/>}
            </button>
            {ttsState!=='idle' && (
              <button onClick={()=>handleTTS('stop')} className="p-2 hover:bg-white/10 rounded-lg">
                <IconSquare size={14}/>
              </button>
            )}
            {/* Lang */}
            <button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-3 py-1 hover:bg-white/10 rounded-lg text-sm font-bold">
              {lang==='zh'?'EN':'中'}
            </button>
            {/* Theme */}
            <button onClick={()=>setIsDark(!isDark)} className="p-2 hover:bg-white/10 rounded-lg">
              {isDark ? <IconSun size={16}/> : <IconMoon size={16}/>}
            </button>
          </div>
        </div>
      </header>

      {/* Main */}
      <main className="flex-1 pt-16 pb-16">
        <div className="max-w-5xl mx-auto px-4 py-8">
          {renderModule()}
          {/* Bottom Nav */}
          <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
            <button onClick={()=>{setModule(Math.max(0,module-1)); window.scrollTo({top:0,behavior:'smooth'});}}
              disabled={module===0}
              className="px-4 py-2 text-sm font-medium text-[#004030] dark:text-[#D8C3A5] disabled:opacity-0">
              ← {t.nav_prev}
            </button>
            <button onClick={()=>{setModule(Math.min(TOTAL-1,module+1)); window.scrollTo({top:0,behavior:'smooth'});}}
              disabled={module===TOTAL-1}
              className="px-4 py-2 text-sm font-medium text-[#004030] dark:text-[#D8C3A5] disabled:opacity-0">
              {t.nav_next} →
            </button>
          </div>
        </div>
      </main>

      {/* Footer */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0 fixed bottom-0 left-0 right-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span className="hidden sm:inline">{t.architect_label}&nbsp;<a href={t.architect_url} target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline">{t.architect_name}</a></span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white font-bold">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
